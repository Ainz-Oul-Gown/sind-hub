<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Синдикат-Хаб</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: var(--tg-theme-bg-color, #181818); color: var(--tg-theme-text-color, #ffffff); margin: 0; padding: 15px; }
        .screen { display: none; } .screen.active { display: block; }
        .card { background: var(--tg-theme-secondary-bg-color, #2c2c2c); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .friend-item { display: flex; justify-content: space-between; padding: 15px; background: var(--tg-theme-secondary-bg-color, #2c2c2c); border-radius: 12px; margin-bottom: 10px; cursor: pointer; }
        
        button { background: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #fff); border: none; padding: 12px; border-radius: 8px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer;}
        input, select { width: 100%; box-sizing: border-box; padding: 10px; margin-top: 5px; margin-bottom: 15px; border-radius: 8px; border: none; background: #111; color: #fff; font-size: 16px;}
        
        .header-nav { display: flex; align-items: center; margin-bottom: 20px; font-weight: bold;}
        .back-btn { margin-right: 15px; cursor: pointer; font-size: 20px; color: var(--tg-theme-button-color, #2481cc); }
        .money-btn { background: #4caf50; border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; font-size: 24px; position: fixed; bottom: 20px; right: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 100; cursor: pointer;}
        .chat-placeholder { background: #1a1a1a; border: 1px dashed #555; border-radius: 12px; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #777; margin-top: 15px; }
        
        /* Кнопка закрытия долга */
        .btn-resolve { background: #444; color: #fff; font-size: 12px; padding: 4px 10px; border-radius: 6px; cursor: pointer; border: none; width: auto; font-weight: normal; }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: ГЛАВНАЯ -->
    <div id="screen-main" class="screen active">
        <h2 style="text-align: center; margin-top: 0;">Синдикат</h2>
        <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
            <div>Мой статус:<br><strong id="my-status" style="font-size: 18px;">...</strong></div>
            <button onclick="toggleStatus()" style="width: auto; padding: 8px 15px;">Сменить</button>
        </div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button onclick="switchScreen('screen-currencies')" style="background: #555;">⚙️ Валюты</button>
            <button onclick="openPWA()" style="background: #28a745;" id="btn-pwa">🌐 Открыть как PWA</button>
        </div>

        <h3 style="color: #999;">Братва:</h3>
        <div id="friends-list">Загрузка...</div>
    </div>

    <!-- ЭКРАН 2: ВАЛЮТЫ -->
    <div id="screen-currencies" class="screen">
        <div class="header-nav"><span class="back-btn" onclick="switchScreen('screen-main')">⬅</span> Настройки моих валют</div>
        <div class="card">
            <input type="text" id="cur-name" placeholder="Название (напр. Адреналин)">
            <input type="number" id="cur-price" placeholder="Цена в рублях (напр. 150)">
            <button onclick="addCurrency()">Добавить валюту</button>
        </div>
        <div id="my-currencies-list"></div>
    </div>

    <!-- ЭКРАН 3: ПРОФИЛЬ ДРУГА -->
    <div id="screen-friend" class="screen">
        <div class="header-nav"><span class="back-btn" onclick="switchScreen('screen-main')">⬅</span> <span id="friend-name-title">Друг</span></div>
        
        <div class="card">
            <h3 style="margin-top:0; margin-bottom: 5px;">Сводка долгов</h3>
            <div id="friend-debts">Загрузка...</div>
        </div>

        <div class="chat-placeholder">💬 Чат в разработке</div>
        
        <!-- Кнопка $ (Добавить мой долг) -->
        <div class="money-btn" onclick="openDebtModal()">💰</div>
    </div>

    <!-- ЭКРАН 4: ОФОРМИТЬ ДОЛГ -->
    <div id="screen-add-debt" class="screen">
        <div class="header-nav"><span class="back-btn" onclick="switchScreen('screen-friend')">⬅</span> Я должен</div>
        <div class="card">
            <label>Сумма в рублях:</label>
            <input type="number" id="debt-rubles" placeholder="Напр. 300" oninput="calculateDebt()">
            <label id="debt-currency-label">В чем принимает друг:</label>
            <select id="debt-currency" onchange="calculateDebt()"></select>
            <div style="margin: 20px 0; font-size: 18px; text-align: center;">Итог: <strong id="debt-result" style="color: #4caf50;">0</strong></div>
            <button onclick="saveDebt()">Записать долг</button>
        </div>
    </div>

    <script>
    const tg = window.Telegram.WebApp;
    tg.expand(); 

    const supabaseClient = supabase.createClient(
        'https://cqhndgtiqdjzzrqdzrfq.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxaG5kZ3RpcWRqenpycWR6cmZxIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MzI4NzE3MCwiZXhwIjoyMDk4ODYzMTcwfQ.OMiry_4g_5Bn5VzjoA79V_MGnccm1x5D-Yne1Wc49Sw'
    );

    // Теперь юзер глобальный и может браться как из ТГ, так и из БД напрямую
    let currentUser = null; 
    let currentFriend = null; 

    // --- УМНАЯ АВТОРИЗАЦИЯ (ТГ + PWA) ---
    async function authUser() {
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');
        const tgUser = tg.initDataUnsafe?.user;

        // Вариант 1: Мы внутри Телеграма
        if (tgUser) {
            currentUser = { id: tgUser.id, first_name: tgUser.first_name };
            
            // Генерируем токен, если его нет
            const myToken = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
            
            // Запрашиваем из базы текущий токен (если есть)
            const { data } = await supabaseClient.from('users').select('auth_token').eq('tg_id', currentUser.id).single();
            let finalToken = data?.auth_token;

            if (!finalToken) {
                finalToken = myToken; // Если токена не было, берем новый
            }

            // Обновляем/Создаем юзера
            await supabaseClient.from('users').upsert({ 
                tg_id: currentUser.id, 
                first_name: currentUser.first_name,
                auth_token: finalToken
            }, { onConflict: 'tg_id' });

            localStorage.setItem('synd_token', finalToken); // Сохраняем в память
            return true;
        } 
        // Вариант 2: Перешли по ссылке с токеном (Настраиваем PWA)
        else if (urlToken) {
            localStorage.setItem('synd_token', urlToken);
            window.history.replaceState({}, document.title, window.location.pathname); // Прячем токен из URL для красоты
            return await fetchUserByToken(urlToken);
        }
        // Вариант 3: Просто открыли PWA (Токен уже в памяти)
        else if (localStorage.getItem('synd_token')) {
            return await fetchUserByToken(localStorage.getItem('synd_token'));
        }

        return false; // Не авторизован
    }

    async function fetchUserByToken(token) {
        const { data } = await supabaseClient.from('users').select('tg_id, first_name').eq('auth_token', token).single();
        if (data) {
            currentUser = { id: data.tg_id, first_name: data.first_name };
            document.getElementById('btn-pwa').style.display = 'none'; // В PWA прячем кнопку PWA
            return true;
        }
        return false;
    }

    // --- ФУНКЦИЯ ДЛЯ ПЕРЕХОДА В PWA ---
    function openPWA() {
        const token = localStorage.getItem('synd_token');
        if (!token) return alert('Ошибка токена!');
        
        // Формируем ссылку на твой гитхаб с токеном
        const baseUrl = window.location.href.split('?')[0]; 
        const pwaUrl = `${baseUrl}?token=${token}`;
        
        // Заставляем Телеграм открыть ссылку во внешнем браузере (Safari/Chrome)
        tg.openLink(pwaUrl);
    }

    async function initApp() {
        const isAuth = await authUser();
        
        if (!isAuth) {
            document.body.innerHTML = '<h2 style="text-align:center; margin-top: 50px;">❌ Доступ запрещен. Открой Хаб через Telegram-бота!</h2>';
            return;
        }

        loadMyStatus(); 
        loadFriends(); 
        loadMyCurrencies();
    }


    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    async function loadMyStatus() {
        const { data } = await supabaseClient.from('users').select('status').eq('tg_id', currentUser.id).single();
        document.getElementById('my-status').innerText = data?.status || 'Свободен 🟢';
    }

    async function toggleStatus() {
        const curr = document.getElementById('my-status').innerText;
        const newStatus = curr.includes('Свободен') ? 'Занят 🔴' : 'Свободен 🟢';
        document.getElementById('my-status').innerText = newStatus;
        await supabaseClient.from('users').update({ status: newStatus }).eq('tg_id', currentUser.id);
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }

    async function loadFriends() {
        const { data } = await supabaseClient.from('users').select('*');
        const list = document.getElementById('friends-list');
        list.innerHTML = '';
        data.forEach(f => {
            if(f.tg_id === currentUser.id) return;
            list.innerHTML += `<div class="friend-item" onclick="openFriend(${f.tg_id}, '${f.first_name}')"><span>${f.first_name}</span><span>${f.status || 'Свободен 🟢'}</span></div>`;
        });
    }

    async function loadMyCurrencies() {
        const { data } = await supabaseClient.from('currencies').select('*').eq('owner_id', currentUser.id);
        document.getElementById('my-currencies-list').innerHTML = data && data.length > 0 
            ? data.map(c => `
                <div class="card" style="padding:10px; display:flex; justify-content:space-between; align-items:center;">
                    <span>${c.name} (${c.rub_value}р)</span>
                    <span style="cursor:pointer; font-size:20px;" onclick="deleteCurrency('${c.id}')">❌</span>
                </div>`).join('')
            : '<p style="color: #777;">У тебя пока нет своих валют.</p>';
    }

    async function addCurrency() {
        const name = document.getElementById('cur-name').value;
        const price = parseFloat(document.getElementById('cur-price').value);
        if(!name || !price) return alert('Заполни поля!');
        await supabaseClient.from('currencies').insert({ owner_id: currentUser.id, name: name, rub_value: price });
        document.getElementById('cur-name').value = ''; document.getElementById('cur-price').value = '';
        loadMyCurrencies();
    }

    async function deleteCurrency(id) {
        if(!confirm('Удалить эту валюту?')) return;
        await supabaseClient.from('currencies').delete().eq('id', id);
        loadMyCurrencies();
    }

    async function openFriend(tgId, name) {
        currentFriend = { id: tgId, name: name };
        document.getElementById('friend-name-title').innerText = name;
        switchScreen('screen-friend');
        
        const { data: iOwe } = await supabaseClient.from('debts').select('*').eq('creditor_id', tgId).eq('debtor_id', currentUser.id);
        const { data: owesMe } = await supabaseClient.from('debts').select('*').eq('creditor_id', currentUser.id).eq('debtor_id', tgId);
        
        let html = '';
        if (iOwe && iOwe.length > 0) {
            html += '<div style="color: #ff5252; margin-top: 10px; font-weight: bold;">🔴 Я должен:</div>';
            html += iOwe.map(d => `<div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom: 1px solid #444;"><span>${d.amount} ${d.currency}</span><button class="btn-resolve" onclick="deleteDebt('${d.id}')">Вернул</button></div>`).join('');
        }
        if (owesMe && owesMe.length > 0) {
            html += '<div style="color: #4caf50; margin-top: 15px; font-weight: bold;">🟢 Мне должны:</div>';
            html += owesMe.map(d => `<div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom: 1px solid #444;"><span>${d.amount} ${d.currency}</span><button class="btn-resolve" onclick="deleteDebt('${d.id}')">Простить</button></div>`).join('');
        }
        document.getElementById('friend-debts').innerHTML = html || '<div style="color:#777; margin-top:10px;">Никто никому не должен</div>';
    }

    async function deleteDebt(id) {
        if(!confirm('Точно закрыть этот долг?')) return;
        await supabaseClient.from('debts').delete().eq('id', id);
        openFriend(currentFriend.id, currentFriend.name); 
    }

    async function openDebtModal() {
        document.getElementById('debt-rubles').value = ''; document.getElementById('debt-result').innerText = '0';
        const { data: friendCurrencies } = await supabaseClient.from('currencies').select('*').eq('owner_id', currentFriend.id);
        const select = document.getElementById('debt-currency');
        select.innerHTML = '';
        if (!friendCurrencies || friendCurrencies.length === 0) {
            select.innerHTML = `<option value="Руб." data-price="1">Рубли (1 к 1)</option>`;
        } else {
            friendCurrencies.forEach(c => select.innerHTML += `<option value="${c.name}" data-price="${c.rub_value}">${c.name} (${c.rub_value}р)</option>`);
        }
        switchScreen('screen-add-debt');
    }

    function calculateDebt() {
        const rubles = parseFloat(document.getElementById('debt-rubles').value) || 0;
        const select = document.getElementById('debt-currency');
        const price = parseFloat(select.options[select.selectedIndex]?.getAttribute('data-price')) || 1;
        document.getElementById('debt-result').innerText = rubles === 0 ? '0' : `${(rubles / price).toFixed(1)} ${select.value}`;
    }

    async function saveDebt() {
        const finalAmountText = document.getElementById('debt-result').innerText; 
        if(finalAmountText === '0') return alert('Введи сумму');
        const [amountStr, ...currencyArr] = finalAmountText.split(' ');
        await supabaseClient.from('debts').insert({
            creditor_id: currentFriend.id, debtor_id: currentUser.id, amount: parseFloat(amountStr), currency: currencyArr.join(' ')
        });
        if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        openFriend(currentFriend.id, currentFriend.name); 
    }

    initApp();
</script>
</body>
</html>
