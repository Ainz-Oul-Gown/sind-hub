<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Синдикат-Хаб</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>

    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #0f0f13);
            --surface: var(--tg-theme-secondary-bg-color, #1c1c1e);
            --surface-hover: rgba(255,255,255,0.05);
            --primary: var(--tg-theme-button-color, #0A84FF);
            --text: var(--tg-theme-text-color, #ffffff);
            --muted: var(--tg-theme-hint-color, #8e8e93);
            --danger: #FF453A;
            --success: #32D74B;
            --border: rgba(255,255,255,0.08);
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* Запрещаем скролл самого body, скроллиться будут только нужные блоки */
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; overflow: hidden; height: var(--tg-viewport-height, 100vh); }
        
        .fas, .far { line-height: 1; display: flex; align-items: center; justify-content: center; }

        .screen { display: none; padding: 16px; height: 100%; overflow-y: auto; animation: fadeIn 0.2s ease; } 
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2.brand-title { font-size: 28px; font-weight: 700; text-align: center; margin: 10px 0 24px; background: linear-gradient(135deg, var(--primary), #32D74B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        h3.section-title { font-size: 14px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; margin: 24px 0 12px 4px; font-weight: 600; }

        .card { background: var(--surface); z-index:10; padding: 16px; border-radius: var(--radius-lg); margin-bottom: 16px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        .profile-card { display: flex; align-items: center; justify-content: space-between; }
        .profile-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: white; background: linear-gradient(135deg, #FF9F0A, #FF453A); flex-shrink: 0; }
        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: 500; background: rgba(50, 215, 75, 0.15); color: var(--success); cursor: pointer; border: 1px solid rgba(50, 215, 75, 0.3); transition: 0.2s; }
        .status-badge.busy { background: rgba(255, 69, 58, 0.15); color: var(--danger); border-color: rgba(255, 69, 58, 0.3); }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .action-btn { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; text-align: center; color: var(--text); font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.2s; }
        .action-btn:active { transform: scale(0.96); background: var(--surface-hover); }
        .action-btn i { font-size: 24px; color: var(--primary); }

        .list-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--surface); border-radius: var(--radius-md); margin-bottom: 8px; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .list-item:active { background: var(--surface-hover); }
        .list-item-left { display: flex; align-items: center; gap: 12px; }
        .list-item-title { font-weight: 600; font-size: 16px; }
        .list-item-subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }
        
        button.primary-btn { background: var(--primary); color: #fff; border: none; padding: 14px; border-radius: var(--radius-md); width: 100%; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button.primary-btn:active { transform: scale(0.98); opacity: 0.9; }
        
        input, select { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: var(--radius-md); border: 1px solid var(--border); background: rgba(0,0,0,0.2); color: var(--text); font-size: 16px; outline: none; transition: 0.2s; font-family: 'Inter', sans-serif;}
        input:focus, select:focus { border-color: var(--primary); }
        
        .header-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        .back-btn { background: none; border: none; color: var(--primary); font-size: 18px; cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 0; }
        .icon-btn { background: none; border: none; color: var(--primary); font-size: 20px; padding: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; aspect-ratio: 1/1; }


        /* Обёртка для аватарки со статусом */
        .avatar-wrap { position: relative; width: 40px; height: 40px; flex-shrink: 0; }
        .avatar-wrap .avatar { width: 100%; height: 100%; font-size: 16px; }
        .status-indicator { position: absolute; bottom: -2px; right: -2px; width: 14px; height: 14px; border-radius: 50%; border: 2.5px solid var(--surface); background: var(--success); z-index: 2; transition: 0.2s; }
        .status-indicator.busy { background: var(--danger); }
        
        /* ОСОБЫЙ ЛЕЙАУТ ДЛЯ ЧАТА */
        /* ОСОБЫЙ ЛЕЙАУТ ДЛЯ ЧАТА */
        #screen-friend.active { display: flex; flex-direction: column; padding: 0; overflow: hidden; }
        .friend-header-wrap { padding: 16px 16px 0; flex-shrink: 0; border-bottom: 1px solid var(--border); background: var(--surface); z-index: 10;}
        
        .chat-container { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; position: relative; }
        .messages-area { flex-grow: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg-bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; position: relative; }
        .msg-mine { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 2px 5px rgba(10,132,255,0.2); }
        .msg-other { background: var(--surface); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .msg-time { font-size: 11px; color: rgba(255, 255, 255, 0.6); text-align: right; margin-top: 4px; margin-bottom: -4px; user-select: none; }
        
        /* Умное поле ввода с TEXTAREA */
        .chat-input-area { flex-shrink: 0; display: flex; align-items: flex-end; padding: 10px 16px; gap: 10px; background: rgba(28, 28, 30, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-top: 1px solid var(--border); padding-bottom: calc(10px + env(safe-area-inset-bottom)); position: relative; z-index: 5;}
        
        .chat-input-area textarea { 
            flex-grow: 1; margin: 0; padding: 10px 16px; border-radius: 20px; background: rgba(0,0,0,0.4); 
            border: 1px solid rgba(255,255,255,0.1); color: white; outline: none; font-family: 'Inter', sans-serif;
            font-size: 16px; resize: none; overflow-y: auto; max-height: 120px; line-height: 20px; min-height: 42px;
        }
        
        .btn-dynamic { width: 42px; height: 42px; border-radius: 50%; border: none; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); flex-shrink: 0; outline: none; -webkit-tap-highlight-color: transparent;}
        .btn-dynamic.mode-mic { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
        .btn-dynamic.mode-send { background: var(--primary); color: white; transform: rotate(-15deg); }
        
        /* UI Записи голоса (Как в ТГ) */
        .record-overlay { position: absolute; inset: 0; background: var(--surface); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 10; opacity: 0; pointer-events: none; transition: 0.2s; border-radius: inherit; }
        .record-overlay.active { opacity: 1; pointer-events: auto; }
        .record-timer { color: var(--danger); font-weight: 600; display: flex; align-items: center; gap: 8px; font-variant-numeric: tabular-nums;}
        .record-timer i { animation: blink 1s infinite; }
        .record-timer.paused i { animation: none; opacity: 1; color: var(--text); }
        .record-slide-hint { color: var(--muted); font-size: 14px; display: flex; align-items: center; gap: 6px; animation: slideUpHint 1.5s infinite; }
        
        /* Новый дизайн локнутого ГС */
        /* Новый дизайн локнутого ГС */
        .record-locked-actions { display: none; width: 100%; justify-content: space-between; align-items: center; padding: 0 10px;}
        .record-locked-actions.active { display: flex; }
        
        .btn-rec-action { width: 42px; height: 42px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; transition: 0.2s;}
        .btn-rec-action:active { transform: scale(0.9); }
        .btn-rec-cancel { background: rgba(255, 69, 58, 0.15); color: var(--danger); }
        .btn-rec-send { background: var(--primary); color: white; transform: rotate(-15deg); margin-left: auto; }
        .btn-rec-resume { background: var(--surface); color: var(--text); border: 1px solid var(--border); margin: 0 15px; }
        
        .record-timer.paused i { animation: none; opacity: 1; color: var(--danger); display: none; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes slideUpHint { 0% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-5px); opacity: 1; } 100% { transform: translateY(0); opacity: 0.5; } }

        
        /* Кастомный ГС UI */
        .voice-player { display: flex; align-items: center; gap: 12px; padding: 4px 6px 4px 4px; background: rgba(0,0,0,0.15); border-radius: 24px; cursor: pointer; margin-bottom: 6px; width: fit-content; }
        .voice-play-btn { width: 36px; height: 36px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 14px; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.2); flex-shrink: 0;}
        .msg-other .voice-play-btn { background: var(--primary); color: white; }
        .voice-waveform { font-size: 18px; color: rgba(255,255,255,0.8); margin-right: 8px; letter-spacing: -2px; }
        
        .transcript-toggle { font-size: 12px; color: rgba(255,255,255,0.7); cursor: pointer; display: inline-flex; align-items: center; gap: 4px; margin-top: 4px; user-select: none; }
        .transcript-content { font-size: 14px; font-style: italic; color: rgba(255,255,255,0.9); background: rgba(0,0,0,0.1); padding: 8px 12px; border-radius: 8px; margin-top: 6px; display: none; border-left: 2px solid rgba(255,255,255,0.3); }

        /* FIX: Модалки теперь FIXED (не скроллятся вместе с фоном) */
        .glass-modal { position: fixed; inset: 0; z-index: 1000; background: rgba(15, 15, 19, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: none; flex-direction: column; padding: 20px; animation: fadeIn 0.2s ease; overflow-y: auto;}
        .glass-modal.active { display: flex; }
        .modal-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.1); border: none; width: 32px; height: 32px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .debt-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border); }
        .debt-row:last-child { border-bottom: none; }
        .debt-amount { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .debt-amount.owe { color: var(--danger); }
        .debt-amount.owed { color: var(--success); }
        .btn-resolve { background: rgba(255,255,255,0.1); color: var(--text); font-size: 14px; padding: 8px 16px; border-radius: 20px; cursor: pointer; border: none; font-weight: 600; transition: 0.2s;}
    </style>
</head>
<body>

    <!-- ЭКРАН 1: ГЛАВНАЯ -->
    <div id="screen-main" class="screen active">
        <h2 class="brand-title">СИНДИКАТ</h2>
        
        <div class="card profile-card">
            <div class="profile-info">
                <div class="avatar" id="my-avatar">М</div>
                <div>
                    <div style="font-weight: 600; font-size: 18px; margin-bottom: 4px;">Мой профиль</div>
                    <!-- Добавляем строчку с шифром: -->
                    <div id="my-fingerprint" style="font-size: 11px; color: var(--success); font-family: monospace; margin-bottom: 6px;">Шифр: Загрузка...</div>
                    <div id="my-status" class="status-badge" onclick="toggleStatus()">
                        <i class="fas fa-circle" style="font-size: 8px;"></i> Свободен
                    </div>
                </div>
            </div>
            <button class="icon-btn" onclick="switchScreen('screen-currencies')"><i class="fas fa-cog" style="color: var(--muted);"></i></button>
        </div>

        
        <div class="action-grid">
            <div class="action-btn" onclick="switchScreen('screen-currencies')">
                <i class="fas fa-coins"></i>
                <span>Мои валюты</span>
            </div>
            <div class="action-btn" onclick="openPWA()" id="btn-pwa">
                <i class="fas fa-mobile-screen"></i>
                <span>Установить PWA</span>
            </div>
        </div>

        <h3 class="section-title">Братва</h3>
        <div id="friends-list">
            <div style="text-align:center; color: var(--muted); padding: 20px;"><i class="fas fa-spinner fa-spin"></i> Загрузка...</div>
        </div>
    </div>

    <!-- ЭКРАН 2: ВАЛЮТЫ -->
    <div id="screen-currencies" class="screen">
        <div class="header-nav">
            <button class="back-btn" onclick="switchScreen('screen-main')"><i class="fas fa-chevron-left"></i> Назад</button>
            <span>Эмиссия валют</span>
            <div style="width: 24px;"></div>
        </div>
        
        <div class="card">
            <h3 class="section-title" style="margin-top: 0;">Создать новую</h3>
            <input type="text" id="cur-name" placeholder="Название (напр. Адреналин)">
            <input type="number" id="cur-price" placeholder="Цена в рублях (напр. 150)">
            <button class="primary-btn" onclick="addCurrency()"><i class="fas fa-plus"></i>Добавить</button>
        </div>
        
        <h3 class="section-title">Мои активы</h3>
        <div id="my-currencies-list"></div>
    </div>

    <!-- ЭКРАН 3: ПРОФИЛЬ ДРУГА И ЛС -->
    <div id="screen-friend" class="screen">
        
        <div class="friend-header-wrap">
            <div class="header-nav" style="margin-bottom: 12px; border: none; padding-bottom: 0;">
                <button class="back-btn" onclick="switchScreen('screen-main')"><i class="fas fa-chevron-left"></i></button>
                <div style="text-align: center; flex-grow: 1;">
                    <div id="friend-name-title" style="font-weight: 600; font-size: 17px;">Друг</div>
                    <div id="friend-fingerprint" style="font-size: 11px; color: var(--success); font-family: monospace; margin-top: 2px;"></div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="icon-btn" onclick="toggleModal('modal-debts')"><i class="fas fa-wallet"></i></button>
                    <button class="icon-btn" onclick="toggleModal('modal-search')"><i class="fas fa-search"></i></button>
                </div>
            </div>
        </div>

        <div class="chat-container">
            <!-- МОДАЛКА: ДОЛГИ -->
            <div id="modal-debts" class="glass-modal">
                <button class="modal-close" onclick="toggleModal('modal-debts')"><i class="fas fa-times"></i></button>
                <h3 style="margin-top: 0; margin-bottom: 20px; font-size: 20px; text-align: center;">Сводка долгов</h3>
                <div class="card" style="background: rgba(0,0,0,0.3); border: none;">
                    <div id="friend-debts-list">Загрузка...</div>
                </div>
                <button class="primary-btn" style="margin-top: auto;" onclick="openDebtModal()"><i class="fas fa-plus"></i> Оформить долг</button>
            </div>

            <!-- МОДАЛКА: ПОИСК -->
            <div id="modal-search" class="glass-modal">
                <button class="modal-close" onclick="toggleModal('modal-search')"><i class="fas fa-times"></i></button>
                <h3 style="margin-top: 0; margin-bottom: 20px; font-size: 20px; text-align: center;">Глубокий поиск</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 16px;">
                    <input type="text" id="search-input" placeholder="Найти в переписке..." style="margin: 0; background: rgba(0,0,0,0.5);">
                    <button class="primary-btn" onclick="performSearch()" style="width: 50px; padding: 0;"><i class="fas fa-search"></i></button>
                </div>
                <div style="display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; font-size: 14px;">
                    <label style="color: var(--text); display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="semantic-toggle" onchange="toggleSlider()" style="width: auto; margin:0;"> ИИ-поиск
                    </label>
                    <div id="slider-container" style="display: none; align-items: center; gap: 5px; color: var(--muted);">
                        <i class="fas fa-sliders-h"></i> <input type="range" id="semantic-slider" min="0.3" max="0.8" step="0.1" value="0.4" style="width: 60px; margin: 0;">
                    </div>
                </div>
                <div id="search-results" style="overflow-y: auto; margin-top: 16px; flex-grow: 1;"></div>
            </div>
            
            <div class="messages-area" id="messages-area">
                <div style="text-align:center; color:var(--muted); margin-top: 40px; font-size: 14px;">
                    <i class="fas fa-shield-alt" style="font-size: 24px; color: var(--success); margin-bottom: 10px;"></i><br>
                    Установка сквозного шифрования...
                </div>
            </div>
            
            <!-- Поле ввода (с растягивающимся textarea) -->
            <div class="chat-input-area">
                <!-- Оверлей записи ГС -->
                <div id="record-overlay" class="record-overlay">
                    
                    <!-- Меню во время паузы (Корзина - Таймер - Микрофон - Отправить) -->
                    <div class="record-locked-actions" id="record-locked-actions">
                        <button class="btn-rec-action btn-rec-cancel" onclick="cancelRecording()"><i class="fas fa-trash-alt"></i></button>
                        
                        <div class="record-timer paused" id="record-timer-paused" style="margin-left: 15px;"><span>0:00</span></div>
                        
                        <button class="btn-rec-action btn-rec-resume" onclick="resumeRecording()"><i class="fas fa-microphone"></i></button>
                        <button class="btn-rec-action btn-rec-send" onclick="stopAndSendRecording()"><i class="fas fa-paper-plane"></i></button>
                    </div>

                    <!-- Стандартный вид (Таймер слева, Подсказка по центру) -->
                    <div class="record-slide-hint" id="record-hint" style="width: 100%; display: flex; justify-content: space-between; align-items: center;">
                        <div class="record-timer" id="record-timer-live"><i class="fas fa-microphone"></i> <span>0:00</span></div>
                        <div style="display: flex; gap: 6px; align-items: center; margin-right: 20px;"><i class="fas fa-chevron-up"></i> Свайп для лока</div>
                    </div>
                    
                </div>

                <textarea id="chat-input" rows="1" placeholder="Сообщение..." oninput="autoResizeInput()"></textarea>
                
                <!-- Кнопка Микрофон/Отправка -->
                <!-- Кнопка Микрофон/Отправка -->
                <button class="btn-dynamic mode-mic" id="btn-input-action" 
                        style="touch-action: none; user-select: none; -webkit-user-select: none;"
                        onpointerdown="startVoiceHold(event)"
                        onpointermove="moveVoiceHold(event)"
                        onpointerup="endVoiceHold(event)"
                        onpointercancel="endVoiceHold(event)">
                    <i class="fas fa-microphone"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- ЭКРАН 4: ОФОРМИТЬ ДОЛГ -->
    <div id="screen-add-debt" class="screen">
        <div class="header-nav">
            <!-- ФИКС: Просто возвращаемся в профиль друга, модалку не дергаем -->
            <button class="back-btn" onclick="switchScreen('screen-friend');"><i class="fas fa-chevron-left"></i> Отмена</button>
            <span>Оформление долга</span>
            <div style="width: 60px;"></div>
        </div>
        
        <div class="card">
            <label style="font-size: 14px; color: var(--muted); margin-bottom: 6px; display: block;">Я должен (в рублях):</label>
            <input type="number" id="debt-rubles" placeholder="Напр. 300" oninput="calculateDebt()" style="font-size: 24px; font-weight: bold; text-align: center;">
            
            <label style="font-size: 14px; color: var(--muted); margin-bottom: 6px; margin-top: 16px; display: block;">В чем принимает друг:</label>
            <select id="debt-currency" onchange="calculateDebt()"></select>
            
            <div style="margin: 30px 0; font-size: 16px; text-align: center; color: var(--muted);">
                Итого к выплате:<br>
                <strong id="debt-result" style="color: var(--success); font-size: 32px; display: block; margin-top: 8px;">0</strong>
            </div>
            <button class="primary-btn" onclick="saveDebt()"><i class="fas fa-handshake"></i> Закрепить сделку</button>
        </div>
    </div>

<script>

    function escapeHTML(str) {
        if (typeof str !== 'string') return str;
        return str.replace(/[&<>'"]/g,
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])
        );
    }

    async function requestMicrophoneAccess() {
        if (!globalAudioStream) {
            try {
                globalAudioStream = await navigator.mediaDevices.getUserMedia({ audio: true });

    // --- ИИ: ЭМБЕДДИНГИ ДЛЯ ПОИСКА ---
    let extractor = null;
    let isAiLoading = false;
    
    async function initAI() {
        if (extractor) return extractor;
        if (isAiLoading) { 
            while (isAiLoading) await new Promise(r => setTimeout(r, 100)); 
            return extractor; 
        }
        
        isAiLoading = true;
        const { pipeline, env } = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.14.0');
        env.allowLocalModels = false;
        extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', { quantized: true });
        isAiLoading = false;
        return extractor;
    }

    function cosineSimilarity(vecA, vecB) {
        let dotProduct = 0, normA = 0, normB = 0;
        for (let i = 0; i < vecA.length; i++) { 
            dotProduct += vecA[i] * vecB[i]; 
            normA += vecA[i] * vecA[i]; 
            normB += vecB[i] * vecB[i]; 
        }
        if (normA === 0 || normB === 0) return 0;
        return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
    }

    async function generateAndEncryptVector(text, aesKey) {
        const ai = await initAI();
        const output = await ai(text, { pooling: 'mean', normalize: true });
        const arrayBuffer = output.data.buffer;
        
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const encryptedContent = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, aesKey, arrayBuffer);
        
        const encryptedBytes = new Uint8Array(encryptedContent);
        const payload = new Uint8Array(iv.length + encryptedBytes.length);
        payload.set(iv, 0); 
        payload.set(encryptedBytes, iv.length);
        
        return btoa(String.fromCharCode.apply(null, payload));
    }

    async function performSearch() {
        const query = document.getElementById('search-input').value.trim();
        const resultsDiv = document.getElementById('search-results');
        const isSemantic = document.getElementById('semantic-toggle').checked;
        const threshold = parseFloat(document.getElementById('semantic-slider').value);

        if (!query || !currentChatId) return;
        resultsDiv.innerHTML = '<div style="color: var(--primary); text-align: center; padding: 20px;"><i class="fas fa-spinner fa-spin fa-2x"></i></div>';

        const { data: history } = await supabaseClient.from('messages').select('encrypted_text, encrypted_vector, created_at').eq('chat_id', currentChatId);
        if (!history || history.length === 0) { resultsDiv.innerHTML = '<div style="color: var(--muted); text-align:center;">Чат пуст.</div>'; return; }

        let results = [];
        let queryVector = null;

        if (isSemantic) {
            resultsDiv.innerHTML = '<div style="color: var(--success); text-align: center; padding: 20px;"><i class="fas fa-brain fa-fade fa-2x"></i><br>Подгружаем ИИ-модель (до 40мб)...</div>';
            try {
                const ai = await initAI();
                resultsDiv.innerHTML = '<div style="color: var(--success); text-align: center; padding: 20px;"><i class="fas fa-brain fa-fade fa-2x"></i><br>Анализ смысла...</div>';
                const output = await ai(query, { pooling: 'mean', normalize: true });
                queryVector = output.data; 
            } catch(e) {
                // ФИКС: Выводим ТОЧНЫЙ текст ошибки, чтобы понять, что блокирует загрузку
                resultsDiv.innerHTML = `<div style="color: var(--danger); text-align:center; padding: 10px;">Ошибка ИИ: ${e.message}<br><span style="font-size: 12px; color: var(--muted);">Попробуй убрать галочку для обычного поиска</span></div>`; 
                return;
            }
        }

        for (const msg of history) {
            try {
                const rawData = atob(msg.encrypted_text);
                const bytes = new Uint8Array(rawData.length);
                for (let i = 0; i < rawData.length; i++) bytes[i] = rawData.charCodeAt(i);
                const decryptedTextBuffer = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: bytes.slice(0, 12) }, currentAesKey, bytes.slice(12));
                let plainText = dec.decode(decryptedTextBuffer);
                
                let displayText = plainText;
                if (plainText.startsWith('[VOICE]:')) {
                    const parts = plainText.replace('[VOICE]:', '').split('|');
                    displayText = parts[1] ? `🎤 ${parts[1]}` : '🎤 ГС';
                }

                if (isSemantic && msg.encrypted_vector) {
                    const vecRaw = atob(msg.encrypted_vector);
                    const vecBytes = new Uint8Array(vecRaw.length);
                    for (let i = 0; i < vecRaw.length; i++) vecBytes[i] = vecRaw.charCodeAt(i);
                    const decryptedVecBuffer = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: vecBytes.slice(0, 12) }, currentAesKey, vecBytes.slice(12));
                    const msgVector = new Float32Array(decryptedVecBuffer); 
                    const score = cosineSimilarity(queryVector, msgVector);
                    if (score >= threshold) results.push({ text: displayText, score: score, time: msg.created_at });
                } else if (!isSemantic) {
                    if (displayText.toLowerCase().includes(query.toLowerCase())) results.push({ text: displayText, score: 1, time: msg.created_at });
                }
            } catch (e) {
                // Игнорируем битые сообщения
            }
        }

        if (results.length === 0) { resultsDiv.innerHTML = '<div style="color: var(--muted); text-align: center; padding: 20px;"><i class="fas fa-ghost fa-2x"></i><br>Ничего не найдено.</div>'; return; }
        
        if (isSemantic) results.sort((a, b) => b.score - a.score);
        else results.sort((a, b) => new Date(b.time) - new Date(a.time));

        resultsDiv.innerHTML = results.map(r => `
            <div style="padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 8px;">
                <div style="color: #fff; margin-bottom: 6px; font-size: 15px;">${escapeHTML(r.text)}</div>
                <div style="color: var(--muted); display: flex; justify-content: space-between; font-size: 12px;">
                    <span>${new Date(r.time).toLocaleDateString()} ${new Date(r.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                    ${isSemantic ? `<span style="color:var(--success);"><i class="fas fa-bullseye"></i> ${(r.score * 100).toFixed(0)}%</span>` : ''}
                </div>
            </div>
        `).join('');
    }

    // Функция для форматирования миллисекунд в формат М:СС,д
    function formatTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        const tenths = Math.floor((ms % 1000) / 100); // Получаем десятые доли (0-9)
        return `${minutes}:${seconds.toString().padStart(2, '0')},${tenths}`;
    }

    function renderWaveform() {
        const waveContainer = document.querySelector('.v-wave');
        if (!waveContainer) return;
        
        waveContainer.innerHTML = ''; // Очищаем старые ||||||
        waveContainer.style.display = 'flex';
        waveContainer.style.alignItems = 'center';
        waveContainer.style.justifyContent = 'space-between';
        waveContainer.style.gap = '2px';
        waveContainer.style.height = '24px'; 
        
        const BARS = 30; // Количество точек/палочек
        let buckets = new Array(BARS).fill(0);
        
        if (volumeHistory.length > 0) {
            // Разбиваем всю историю записи на 30 равных отрезков
            const step = volumeHistory.length / BARS;
            for (let i = 0; i < BARS; i++) {
                let start = Math.floor(i * step);
                let end = Math.floor((i + 1) * step);
                if (end === start) end = start + 1; 
                
                let sum = 0, count = 0;
                for (let j = start; j < end && j < volumeHistory.length; j++) {
                    sum += volumeHistory[j];
                    count++;
                }
                buckets[i] = count > 0 ? sum / count : 0;
            }
        }
        
        // Рисуем 30 палочек
        buckets.forEach(vol => {
            // vol (громкость) от 0 до 255. Высота палочки от 3px до 24px
            let h = 3 + (vol / 255) * 21; 
            const bar = document.createElement('div');
            bar.style.width = '3px';
            bar.style.height = `${h}px`;
            bar.style.backgroundColor = 'rgba(255,255,255,0.8)';
            bar.style.borderRadius = '2px';
            waveContainer.appendChild(bar);
        });
    }

                    if (!isRecording) return; 
                    
                    if (!isPaused) {
                        vAnalyser.getByteFrequencyData(dataArray);
                        let sum = 0;
                        for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                        let avgVolume = sum / dataArray.length; 
                        
                        // --- ИСПРАВЛЕНИЕ: Усиливаем чувствительность ---
                        // Обычный голос выдает 15-30. Делим на 40, чтобы получить сильный буст (до +40% к размеру)
                        let scaleBoost = Math.min(0.4, avgVolume / 40); 
                        
                        if (!isRecordingLocked) {
                            // 1. МЫ ДЕРЖИМ ПАЛЕЦ: пульсирует главная кнопка
                            const mainBtn = document.getElementById('btn-input-action');

                            const planes = document.querySelectorAll('.v-send');
                            planes.forEach(plane => {
                                plane.style.transform = `scale(${1 + scaleBoost}) rotate(-15deg)`;
                            });
                        }
                        
                        // Сбор истории для вейвформы (без изменений)
                        const now = Date.now();
                        if (now - lastVolumeSampleTime > 100) {
                            volumeHistory.push(avgVolume);
                            lastVolumeSampleTime = now;
                        }
                    }
                    requestAnimationFrame(trackVolume);
                }
                trackVolume();
            } catch(e) { console.warn("Аудио анализатор не запустился:", e); }
            // =========================================
            
            // Один таймер на все три слоя
            recTimerInterval = setInterval(() => {
                if (!isPaused) {
                    const timeStr = formatTime(Date.now() - recStartTime);
                    document.querySelectorAll('.v-time-text').forEach(el => el.innerText = timeStr);
                }
            }, 100);
            
        } catch (err) { isPointerDown = false; }
    }

    function moveVoiceHold(e) {
        if (!isRecording || isRecordingLocked || !isPointerDown || isCancelled) return;

        const deltaY = startY - e.clientY;
        const deltaX = startX - e.clientX;

        // Отмена (свайп влево)
        if (deltaX > 40) {
            isCancelled = true;
            window.shouldSendVoice = false;
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
            mediaRecorder.stop(); 
            const btn = document.getElementById('btn-input-action');
            try { btn.releasePointerCapture(e.pointerId); } catch(err) {}
            isPointerDown = false;
            return;
        }

        // Блокировка (свайп вверх)
        if (deltaY > 50) {
            isRecordingLocked = true;
            
            // Переключаем слои (прячем удержание, показываем лок)
            document.getElementById('v-hold-ui').classList.remove('active');
            document.getElementById('v-locked-rec-ui').classList.add('active');
            
            // Прячем центральную кнопку-микрофон
            document.getElementById('btn-input-action').style.display = 'none';
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            
            const btn = document.getElementById('btn-input-action');
            try { btn.releasePointerCapture(e.pointerId); } catch(err) {}
            isPointerDown = false;
        }
    }

    function endVoiceHold(e) {
        isPointerDown = false;
        const btn = document.getElementById('btn-input-action');
        try { if (e && e.pointerId) btn.releasePointerCapture(e.pointerId); } catch(err) {}
        
        if (!isRecording || isCancelled || isRecordingLocked) return;
        window.shouldSendVoice = true;
        mediaRecorder.stop();
    }

    const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });

    aiWorker.onmessage = (event) => {
        const msg = event.data;

            console.log("AI Loading:", msg.percent);
        } else if (msg.type === 'ready') {
            isAiReady = true;

    function transcribeViaWorker(audioFloat32Array) {
        return new Promise((resolve, reject) => {
            const taskId = Date.now();
            const handler = (event) => {
                const msg = event.data;
                if (msg.id === taskId) {
                    aiWorker.removeEventListener('message', handler);
                    if (msg.type === 'result') resolve(msg.text);
                    else if (msg.type === 'error') reject(new Error(msg.error));
                }
            };
            aiWorker.addEventListener('message', handler);
            aiWorker.postMessage({ type: 'transcribe', id: taskId, audioData: audioFloat32Array });
        });
    }

    async function processBackgroundVoice(audioBlob) {
        if (!currentAesKey || !currentChatId) return;
        const fileName = `voice_${Date.now()}_${currentUser.id}.bin`;
        const arrayBuffer = await audioBlob.arrayBuffer();
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const encryptedContent = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, currentAesKey, arrayBuffer);
        const encryptedBytes = new Uint8Array(encryptedContent);
        const payload = new Uint8Array(iv.length + encryptedBytes.length);
        payload.set(iv, 0); payload.set(encryptedBytes, iv.length);

        await supabaseClient.storage.from('voice_messages').upload(fileName, payload, { contentType: 'application/octet-stream' });
        const textMarker = `[VOICE]:${fileName}`;
        const encryptedPayloadText = await encryptText(textMarker, currentAesKey);

        const { data: insertedMsg, error: insertErr } = await supabaseClient.from('messages').insert([
            { chat_id: currentChatId, sender_id: currentUser.id, encrypted_text: encryptedPayloadText }
        ]).select().single();
        if (!insertedMsg || insertErr) return;

        try {
            if (audioContext.state === 'suspended') await audioContext.resume();
            const rawAudioBuffer = await audioBlob.arrayBuffer();
            const decodedAudio = await audioContext.decodeAudioData(rawAudioBuffer);
            const audioFloat32 = decodedAudio.getChannelData(0);
            const transcribedText = await transcribeViaWorker(audioFloat32);
            if (!transcribedText || transcribedText.trim() === '') throw new Error("ИИ не услышал слов");

            const encryptedVector = await generateAndEncryptVector(transcribedText, currentAesKey);
            const newMarker = `[VOICE]:${fileName}|${transcribedText.trim()}`;
            const newEncryptedText = await encryptText(newMarker, currentAesKey);

            await supabaseClient.from('messages').update({ encrypted_text: newEncryptedText, encrypted_vector: encryptedVector }).eq('id', insertedMsg.id);
        } catch (e) {
            try {
                const errorMarker = `[VOICE]:${fileName}|❌ Ошибка: ${e.message}`;
                const errorEncryptedText = await encryptText(errorMarker, currentAesKey);
                await supabaseClient.from('messages').update({ encrypted_text: errorEncryptedText }).eq('id', insertedMsg.id);
            } catch (fallbackErr) {}
        }
    }

    async function loadAndPlayVoice(fileName, element) {

            if (element.audioObj.paused) { 
                element.audioObj.play();

        if (error) { icon.className = 'fas fa-exclamation-triangle'; return; }
        
        const bytes = new Uint8Array(await data.arrayBuffer());
        try {
            const decryptedBuffer = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: bytes.slice(0, 12) }, currentAesKey, bytes.slice(12));
            const audioUrl = URL.createObjectURL(new Blob([decryptedBuffer]));
            
            const audio = new Audio(audioUrl);
            element.audioObj = audio; 
            
            audio.onended = () => { icon.className = 'fas fa-play'; };
            audio.play();
            icon.className = 'fas fa-pause';

    function renderMessage(text, isMine, timeString = "", msgId = null) {
        const area = document.getElementById('messages-area');

        if (!div) {
            div = document.createElement('div');

            div.className = `msg-bubble ${isMine ? 'msg-mine' : 'msg-other'}`;
            isNew = true;
        }

        if (text.startsWith('[VOICE]:')) {
            const parts = text.replace('[VOICE]:', '').split('|');
            const fileName = parts[0];
            const hasTranscript = parts[1] && !parts[1].includes('❌ Ошибка');
            const transcriptionText = parts[1] ? parts[1] : 'ИИ анализирует... ⏳';
            
            let transcriptHtml = '';
            if (hasTranscript) {
                transcriptHtml = `
                    <div class="transcript-toggle" onclick="toggleTranscript(this)"><i class="fas fa-chevron-down"></i> Показать перевод</div>
                    <div class="transcript-content" style="display:none;">${escapeHTML(transcriptionText)}</div>
                `;
            } else {
                transcriptHtml = `<div class="transcript-toggle" style="cursor:default;">${escapeHTML(transcriptionText)}</div>`;
            }

            div.innerHTML = `
                <div class="voice-player" onclick="loadAndPlayVoice('${fileName}', this)">
                    <div class="voice-play-btn"><i class="fas fa-play" style="margin-left: 3px;"></i></div>
                    <div class="voice-waveform">|||||||||</div>
                </div>
                ${transcriptHtml}
            `;
        } else {
            // Уважаем переносы строк
            div.innerHTML = escapeHTML(text).replace(/\n/g, '<br>');
        }

        if (timeString) {
            const timeDiv = document.createElement('div');
            timeDiv.className = 'msg-time';
            timeDiv.innerText = timeString;
            div.appendChild(timeDiv);
        }

        if (isNew) {
            area.appendChild(div);
            area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' });
        }
    }

    async function encryptText(text, aesKey) {
        const iv = window.crypto.getRandomValues(new Uint8Array(12));

        const encryptedBytes = new Uint8Array(encryptedContent);
        const payload = new Uint8Array(iv.length + encryptedBytes.length);
        payload.set(iv, 0); payload.set(encryptedBytes, iv.length);
        return btoa(String.fromCharCode.apply(null, payload));

    async function generateChatKey() { return await window.crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]); }

    async function encryptChatKeyForFriend(chatKey, friendPublicJwk) {
        const friendPublicKey = await window.crypto.subtle.importKey("jwk", friendPublicJwk, { name: "RSA-OAEP", hash: "SHA-256" }, true, ["encrypt"]);
        const rawChatKey = await window.crypto.subtle.exportKey("raw", chatKey);
        const encryptedKeyBuffer = await window.crypto.subtle.encrypt({ name: "RSA-OAEP" }, friendPublicKey, rawChatKey);
        return btoa(String.fromCharCode.apply(null, new Uint8Array(encryptedKeyBuffer)));
    }

    async function decryptChatKey(encryptedKeyBase64) {
        const myPrivateKey = await idbKeyval.get(`my_private_key_${currentUser.id}`);
        const binaryString = atob(encryptedKeyBase64);
        const encryptedKeyBuffer = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) encryptedKeyBuffer[i] = binaryString.charCodeAt(i);
        const rawChatKey = await window.crypto.subtle.decrypt({ name: "RSA-OAEP" }, myPrivateKey, encryptedKeyBuffer);
        return await window.crypto.subtle.importKey("raw", rawChatKey, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
    }

    async function getFingerprint(jwkKeyString) {
        if (!jwkKeyString) return "НЕТ КЛЮЧА";
        const hashBuffer = await window.crypto.subtle.digest('SHA-256', enc.encode(jwkKeyString));
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const num = (hashArray[0] << 24 | hashArray[1] << 16 | hashArray[2] << 8 | hashArray[3]) >>> 0;
        return num.toString().padStart(10, '0').match(/.{1,5}/g).join('-'); 
    }

                    renderMessage(dec.decode(decryptedBuffer), msg.sender_id === currentUser.id, timeStr, msg.id);
                } catch (e) {
                    renderMessage("🔒 [История скрыта]", msg.sender_id === currentUser.id, timeStr, msg.id);
                }
            }
        }
        subscribeToPrivateMessages();
    }

    async function initApp() {
        const isAuth = await authUser();
        if (!isAuth) { document.body.innerHTML = '<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; color:var(--danger);"><i class="fas fa-lock" style="font-size:48px; margin-bottom:20px;"></i><h2>Доступ запрещен</h2></div>'; return; }
        
        const avatarEl = document.getElementById('my-avatar');
        avatarEl.innerText = currentUser.first_name.charAt(0).toUpperCase();
        avatarEl.style.background = getAvatarGradient(currentUser.id);

        // Получаем свой публичный ключ из БД и вычисляем отпечаток

        const { data: myData } = await supabaseClient.from('users').select('public_key').eq('tg_id', currentUser.id).single();
        const myFingerprint = await getFingerprint(myData?.public_key);
        document.getElementById('my-fingerprint').innerText = `Шифр: ${myFingerprint}`;


        loadMyStatus();
        loadFriends();
        loadMyCurrencies();
        setTimeout(() => { aiWorker.postMessage({ type: 'init' }); }, 1000);
    }

    async function loadMyStatus() {
        const { data } = await supabaseClient.from('users').select('status').eq('tg_id', currentUser.id).single();
        const statusEl = document.getElementById('my-status');
        const isBusy = data?.status?.includes('Занят');
        statusEl.className = `status-badge ${isBusy ? 'busy' : ''}`;
        statusEl.innerHTML = `<i class="fas fa-circle" style="font-size: 8px;"></i> ${isBusy ? 'Занят' : 'Свободен'}`;
    }

    async function toggleStatus() {
        const curr = document.getElementById('my-status').innerText;
        const newStatus = curr.includes('Свободен') ? 'Занят 🔴' : 'Свободен 🟢';
        await supabaseClient.from('users').update({ status: newStatus }).eq('tg_id', currentUser.id);
        loadMyStatus();
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }

    window.currentFriendsData = [];
    async function loadFriends() {
        const { data } = await supabaseClient.from('users').select('*');
        window.currentFriendsData = data;
        const list = document.getElementById('friends-list');
        list.innerHTML = '';
        data.forEach(f => {
            if(f.tg_id === currentUser.id) return;
            const safeName = escapeHTML(f.first_name);
            const isBusy = f.status?.includes('Занят');
            
            list.innerHTML += `
                <div class="list-item" onclick="safeOpenFriend(${f.tg_id})">
                    <div class="list-item-left">
                        <div class="avatar-wrap">
                            <div class="avatar" style="background: ${getAvatarGradient(f.tg_id)};">
                                ${safeName.charAt(0).toUpperCase()}
                            </div>
                            <div class="status-indicator ${isBusy ? 'busy' : ''}"></div>
                        </div>
                        <div>
                            <div class="list-item-title">${safeName}</div>
                            <div class="list-item-subtitle" style="color: var(--muted);">${isBusy ? 'Занят' : 'В сети'}</div>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right" style="color: var(--muted); font-size: 14px;"></i>
                </div>
            `;
        });
    }

    function safeOpenFriend(tgId) {
        const friend = window.currentFriendsData.find(f => f.tg_id === tgId);
        if (friend) openFriend(tgId, friend.first_name);
    }

    async function loadMyCurrencies() {
        const { data, error } = await supabaseClient.from('currencies').select('*').eq('owner_id', currentUser.id);
        const list = document.getElementById('my-currencies-list');
        if (error || !data || data.length === 0) { list.innerHTML = '<p style="color: var(--muted); text-align: center;">Активов пока нет.</p>'; return; }
        
        list.innerHTML = data.map(c => `
            <div class="list-item">
                <div class="list-item-left">
                    <div class="avatar" style="background: rgba(10,132,255,0.15); color: var(--primary); width: 40px; height: 40px;"><i class="fas fa-coins"></i></div>
                    <div>
                        <div class="list-item-title">${escapeHTML(c.name)}</div>
                        <div class="list-item-subtitle">Курс: ${c.rub_value} ₽</div>
                    </div>
                </div>
                <div style="padding: 10px; cursor: pointer; color: var(--danger);" onclick="deleteCurrency('${c.id}')"><i class="fas fa-trash-alt"></i></div>
            </div>
        `).join('');
    }

    async function addCurrency() {
        const name = document.getElementById('cur-name').value;
        const price = parseFloat(document.getElementById('cur-price').value);
        if(!name || !price) return alert('Заполни поля!');
        
        const { error } = await supabaseClient.from('currencies').insert({ owner_id: currentUser.id, name: name, rub_value: price });
        if (error) { alert('Ошибка БД: ' + error.message); return; }
        
        document.getElementById('cur-name').value = ''; document.getElementById('cur-price').value = '';
        loadMyCurrencies();
    }

    async function deleteCurrency(id) {
        if(!confirm('Сжечь эту валюту?')) return;
        await supabaseClient.from('currencies').delete().eq('id', id);
        loadMyCurrencies();
    }

    // НОВАЯ ФУНКЦИЯ ДЛЯ ОТДЕЛЬНОЙ ЗАГРУЗКИ ДОЛГОВ
    async function loadDebts(tgId) {
        const { data: iOwe } = await supabaseClient.from('debts').select('*').eq('creditor_id', tgId).eq('debtor_id', currentUser.id);
        const { data: owesMe } = await supabaseClient.from('debts').select('*').eq('creditor_id', currentUser.id).eq('debtor_id', tgId);

        let html = '';
        if (iOwe && iOwe.length > 0) {
            html += iOwe.map(d => `
                <div class="debt-row">
                    <span class="debt-amount owe"><i class="fas fa-arrow-up" style="font-size: 12px; margin-right: 4px;"></i> ${d.amount} ${escapeHTML(d.currency)}</span>
                    <button class="btn-resolve" onclick="deleteDebt('${d.id}')">Отдал</button>
                </div>`).join('');
        }
        if (owesMe && owesMe.length > 0) {
            html += owesMe.map(d => `
                <div class="debt-row">
                    <span class="debt-amount owed"><i class="fas fa-arrow-down" style="font-size: 12px; margin-right: 4px;"></i> ${d.amount} ${escapeHTML(d.currency)}</span>
                    <button class="btn-resolve" onclick="deleteDebt('${d.id}')">Простить</button>
                </div>`).join('');
        }
        document.getElementById('friend-debts-list').innerHTML = html || '<div style="color:var(--muted); font-size: 15px; text-align: center; padding: 20px 0;"><i class="fas fa-check-circle" style="font-size:32px; color:var(--success); margin-bottom:10px; opacity:0.7;"></i><br>Никто никому не должен</div>';
    }

    async function openFriend(tgId, name) {
        currentFriend = { id: tgId, name: name };
        document.getElementById('friend-name-title').innerText = name;
        switchScreen('screen-friend');
        
        await loadDebts(tgId);
        await initPrivateChat(tgId);
        
        // --- ФИКС: Просим микрофон при входе в чат! ---
        requestMicrophoneAccess(); 
        
        const { data: friendData } = await supabaseClient.from('users').select('public_key').eq('tg_id', tgId).single();
        const fingerprint = await getFingerprint(friendData?.public_key);
        document.getElementById('friend-fingerprint').innerText = `Шифр: ${fingerprint}`;
    }

    async function deleteDebt(id) {
        if(!confirm('Закрыть этот долг?')) return;
        await supabaseClient.from('debts').delete().eq('id', id);
        await loadDebts(currentFriend.id);
    }

    // --- ЖЕЛЕЗОБЕТОННАЯ ЛОГИКА ДОЛГОВ ---
    function openDebtModal() {
        // 1. МГНОВЕННО переключаем экран и прячем модалку (никаких await)
        switchScreen('screen-add-debt');
        const modal = document.getElementById('modal-debts');
        if (modal) modal.classList.remove('active');
        
        // 2. Всю тяжелую работу откладываем на долю секунды, чтобы анимация экрана не залагала
        setTimeout(async () => {
            const rublesInput = document.getElementById('debt-rubles');
            const resultText = document.getElementById('debt-result');
            if (rublesInput) rublesInput.value = '';
            if (resultText) resultText.innerText = '0';
            
            const select = document.getElementById('debt-currency');
            if (!select) return;
            select.innerHTML = '<option value="Руб." data-price="1">Загрузка...</option>';
            
            try {
                const { data: friendCurrencies } = await supabaseClient
                    .from('currencies')
                    .select('*')
                    .eq('owner_id', currentFriend.id);
                    
                select.innerHTML = '';
                if (!friendCurrencies || friendCurrencies.length === 0) {
                    select.innerHTML = `<option value="Руб." data-price="1">Рубли (1 к 1)</option>`;
                } else {
                    friendCurrencies.forEach(c => {
                        const safeName = escapeHTML(c.name);
                        select.innerHTML += `<option value="${safeName}" data-price="${c.rub_value}">${safeName} (Курс: ${c.rub_value} ₽)</option>`;
                    });
                }
            } catch (e) {
                select.innerHTML = `<option value="Руб." data-price="1">Ошибка БД (Рубли)</option>`;
            }
        }, 10); // Отложенный запуск
    }

    async function saveDebt() {
        const rublesInput = document.getElementById('debt-rubles');
        const rubles = parseFloat(rublesInput.value);
        if (isNaN(rubles) || rubles <= 0) return alert('Введите корректную сумму!');
        
        const select = document.getElementById('debt-currency');
        const price = parseFloat(select.options[select.selectedIndex]?.getAttribute('data-price')) || 1;
        const currencyName = select.value || 'Руб.';
        
        const finalAmount = parseFloat((rubles / price).toFixed(2));
        if (finalAmount > 1000000000) return alert('Сумма превышает лимиты.');

        const payload = { 
            creditor_id: currentFriend.id, 
            debtor_id: currentUser.id, 
            amount: finalAmount, 
            currency: currencyName 
        };

        const { error } = await supabaseClient.from('debts').insert(payload).select();
        
        if (error) { 
            alert("Ошибка сохранения: " + error.message);
            return; 
        }
        
        if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        
        // Просто возвращаемся в чат и обновляем долги в фоне. 
        // Не пытаемся насильно открыть модалку, чтобы не багалась анимация
        switchScreen('screen-friend');
        await loadDebts(currentFriend.id);
    }
    
    function calculateDebt() {
        const rubles = parseFloat(document.getElementById('debt-rubles').value) || 0;
        const select = document.getElementById('debt-currency');
        const price = parseFloat(select.options[select.selectedIndex]?.getAttribute('data-price')) || 1;
        document.getElementById('debt-result').innerText = rubles === 0 ? '0' : `${(rubles / price).toFixed(2)} ${select.value}`;
    }

    initApp();
</script>
</body>
</html>
