    <script>
    const tg = window.Telegram.WebApp;
    tg.expand(); 

    const supabaseClient = supabase.createClient(
        'https://cqhndgtiqdjzzrqdzrfq.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxaG5kZ3RpcWRqenpycWR6cmZxIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MzI4NzE3MCwiZXhwIjoyMDk4ODYzMTcwfQ.OMiry_4g_5Bn5VzjoA79V_MGnccm1x5D-Yne1Wc49Sw'
    );

    // Теперь юзер глобальный и может браться как из ТГ, так и из БД напрямую
    let currentUser = null; 
    let currentFriend = null; 

    async function setupTestRoom() {
        const testChatId = "00000000-0000-0000-0000-000000000001"; // Тот самый ID из SQL
        let aesKey = await idbKeyval.get('current_chat_key');
    
        // Если ключа еще нет (первый запуск), куем его локально
        if (!aesKey) {
            console.log("Генерируем тестовый AES-ключ чата...");
            aesKey = await window.crypto.subtle.generateKey(
                { name: "AES-GCM", length: 256 },
                true,
                ["encrypt", "decrypt"]
            );
            await idbKeyval.set('current_chat_key', aesKey);
            console.log("Тестовый ключ готов и спрятан в IndexedDB.");
        }
    
        console.log("Подключаемся к матрице... Слушаем сообщения.");
        
        // Запускаем функцию прослушки из предыдущего кода
        listenForMessages(testChatId, aesKey);
        
        // ВАЖНО: Не забудь обновить testChatId в функции sendTextMessage
        // const testChatId = "00000000-0000-0000-0000-000000000001";
    }

    // Вспомогательная функция перевода строки в байты
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    
    // 1. ШИФРОВАНИЕ ТЕКСТА
    async function encryptText(text, aesKey) {
        // В AES-GCM нужен вектор инициализации (IV). Это как "соль" для пароля.
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        
        const encryptedContent = await window.crypto.subtle.encrypt(
            { name: "AES-GCM", iv: iv },
            aesKey,
            enc.encode(text)
        );
    
        // Склеиваем IV и само сообщение, чтобы при расшифровке знать эту "соль"
        const encryptedBytes = new Uint8Array(encryptedContent);
        const payload = new Uint8Array(iv.length + encryptedBytes.length);
        payload.set(iv, 0);
        payload.set(encryptedBytes, iv.length);
    
        // Превращаем массив в Base64, чтобы положить в Supabase как текст (text тип колонки)
        return btoa(String.fromCharCode.apply(null, payload));
    }
    
    // 2. ОТПРАВКА СООБЩЕНИЯ
    async function sendTextMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;
    
        // Временно берем "тестовый" chat_id (нужно будет создать запись в таблице chats)
        const testChatId = "00000000-0000-0000-0000-000000000001";
        const aesKey = await idbKeyval.get('current_chat_key'); // Достаем ключ из памяти
    
        if (!aesKey) {
            alert("Сначала нужно выковать ключ чата!");
            return;
        }
    
        const encryptedPayload = await encryptText(text, aesKey);
    
        input.value = ""; // Очищаем поле
        
        // Пишем в БД
        await supabaseClient.from('messages').insert([
            { 
                chat_id: testChatId, 
                sender_id: currentUser.id, 
                encrypted_text: encryptedPayload 
            }
        ]);
    }
    
    // 3. СЛУШАЕМ БАЗУ (WebSockets)
    function listenForMessages(chatId, aesKey) {
        supabaseClient.channel('custom-all-channel')
            .on(
                'postgres_changes',
                { event: 'INSERT', schema: 'public', table: 'messages', filter: `chat_id=eq.${chatId}` },
                async (payload) => {
                    const newMsg = payload.new;
                    
                    // РАСШИФРОВКА
                    const rawData = atob(newMsg.encrypted_text);
                    const bytes = new Uint8Array(rawData.length);
                    for (let i = 0; i < rawData.length; i++) bytes[i] = rawData.charCodeAt(i);
    
                    // Достаем IV (первые 12 байт) и сам шифр
                    const iv = bytes.slice(0, 12);
                    const data = bytes.slice(12);
    
                    try {
                        const decryptedBuffer = await window.crypto.subtle.decrypt(
                            { name: "AES-GCM", iv: iv },
                            aesKey,
                            data
                        );
                        const plainText = dec.decode(decryptedBuffer);
                        
                        // Рисуем сообщение в UI
                        renderMessage(plainText, newMsg.sender_id === currentUser.id);
                    } catch (e) {
                        renderMessage("🔒 [Ошибка расшифровки]", newMsg.sender_id === currentUser.id);
                    }
                }
            )
            .subscribe();
    }
    
    function renderMessage(text, isMine) {
        const area = document.getElementById('messages-area');
        const div = document.createElement('div');
        div.className = `msg-bubble ${isMine ? 'msg-mine' : 'msg-other'}`;
        div.innerText = text;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight; // Скролл вниз
    }

    async function checkCryptoKeys(userId) {
        // Проверяем, есть ли приватный ключ в локальной базе браузера
        const privateKey = await idbKeyval.get('my_private_key');
        
        if (!privateKey) {
            console.log("Ключи не найдены. Выковываем новую крипто-броню...");
            // Функция генерации ключей, которую мы обсуждали ранее
            const publicKeyJwk = await generatePersonalArmor(); 
            
            // Отправляем публичный ключ в новую колонку таблицы users
            const { error } = await supabase
                .from('users')
                .update({ public_key: JSON.stringify(publicKeyJwk) })
                .eq('tg_id', userId);
                
            if (error) {
                console.error("Ошибка загрузки ключа в базу:", error);
            } else {
                console.log("Публичный сейф успешно загружен в Supabase!");
            }
        } else {
            console.log("Крипто-броня активна, ключи на месте.");
        }
    }

    async function generatePersonalArmor() {
        // 1. Генерируем RSA-пару (Публичный и Приватный)
        const keyPair = await window.crypto.subtle.generateKey(
            {
                name: "RSA-OAEP",
                modulusLength: 4096,
                publicExponent: new Uint8Array([1, 0, 1]),
                hash: "SHA-256"
            },
            true, // Публичный можно будет экспортировать
            ["encrypt", "decrypt"]
        );
    
        // 2. Прячем Приватный ключ в IndexedDB намертво!
        // extractable: false мы не ставим на этапе генерации RSA-OAEP для простоты работы с IDB,
        // но IDB сама по себе защитит объект от XSS.
        await idbKeyval.set('my_private_key', keyPair.privateKey);
    
        // 3. Экспортируем Публичный ключ в строку (чтобы отправить в Supabase)
        const exportedPublicKey = await window.crypto.subtle.exportKey(
            "jwk",
            keyPair.publicKey
        );
    
        // TODO: Записать exportedPublicKey в таблицу users в Supabase
        return exportedPublicKey;
    }

    async function generateChatKey() {
        // Генерируем AES-GCM (очень быстрый алгоритм для текста)
        const chatKey = await window.crypto.subtle.generateKey(
            { name: "AES-GCM", length: 256 },
            true, // Разрешаем экспорт, чтобы упаковать в чужие сейфы
            ["encrypt", "decrypt"]
        );
        return chatKey;
    }

    // publicJwk - это публичный ключ друга из БД Supabase
    async function encryptChatKeyForFriend(chatKey, friendPublicJwk) {
        // 1. Собираем Публичный ключ друга обратно из строки
        const friendPublicKey = await window.crypto.subtle.importKey(
            "jwk",
            friendPublicJwk,
            { name: "RSA-OAEP", hash: "SHA-256" },
            true,
            ["encrypt"]
        );
    
        // 2. Достаем сырые байты нашего AES-ключа
        const rawChatKey = await window.crypto.subtle.exportKey("raw", chatKey);
    
        // 3. Шифруем AES-ключ Публичным ключом друга (кладем в сейф)
        const encryptedKeyBuffer = await window.crypto.subtle.encrypt(
            { name: "RSA-OAEP" },
            friendPublicKey,
            rawChatKey
        );
    
        // Эту абракадабру (encryptedKeyBuffer) ты отправляешь в БД Supabase
        // в таблицу chat_keys: { user_id: 'SANYA_ID', encrypted_key: '...' }
        return encryptedKeyBuffer; 
    }

    async function decryptChatKey(encryptedKeyBuffer) {
        // 1. Достаем свой Приватный ключ из "невидимого сейфа" браузера
        const myPrivateKey = await idbKeyval.get('my_private_key');
    
        // 2. Вскрываем посылку (Расшифровываем AES-ключ)
        const rawChatKey = await window.crypto.subtle.decrypt(
            { name: "RSA-OAEP" },
            myPrivateKey,
            encryptedKeyBuffer
        );
    
        // 3. Превращаем сырые байты обратно в рабочий Crypto-объект
        const chatKey = await window.crypto.subtle.importKey(
            "raw",
            rawChatKey,
            { name: "AES-GCM", length: 256 },
            false, // ВАЖНО! Больше он телефон не покинет
            ["encrypt", "decrypt"]
        );
    
        // Теперь Саня может читать и писать сообщения в чат с помощью chatKey
        return chatKey;
    }
        
    // --- УМНАЯ АВТОРИЗАЦИЯ (ТГ + PWA) ---
async function authUser() {
    const urlParams = new URLSearchParams(window.location.search);
    const urlToken = urlParams.get('token');
    const tgUser = tg.initDataUnsafe?.user;

    let isAuthorized = false;

    // Вариант 1: Мы внутри Телеграма
    if (tgUser) {
        currentUser = { id: tgUser.id, first_name: tgUser.first_name };
        
        const myToken = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        
        const { data } = await supabaseClient.from('users').select('auth_token').eq('tg_id', currentUser.id).single();
        let finalToken = data?.auth_token;

        if (!finalToken) {
            finalToken = myToken; 
        }

        await supabaseClient.from('users').upsert({ 
            tg_id: currentUser.id, 
            first_name: currentUser.first_name,
            auth_token: finalToken
        }, { onConflict: 'tg_id' });

        localStorage.setItem('synd_token', finalToken);
        isAuthorized = true;
    } 
    // Вариант 2: Перешли по ссылке с токеном (Настраиваем PWA)
    else if (urlToken) {
        localStorage.setItem('synd_token', urlToken);
        window.history.replaceState({}, document.title, window.location.pathname);
        isAuthorized = await fetchUserByToken(urlToken); // Функция должна записывать данные в currentUser
    }
    // Вариант 3: Просто открыли PWA (Токен уже в памяти)
    else if (localStorage.getItem('synd_token')) {
        isAuthorized = await fetchUserByToken(localStorage.getItem('synd_token')); // Функция должна записывать данные в currentUser
    }

    // Если авторизация прошла успешно, запускаем проверку крипто-брони!
    if (isAuthorized && currentUser && currentUser.id) {
        await checkCryptoKeys(currentUser.id);
        return true;
    }

    return false; // Не авторизован
}

    async function fetchUserByToken(token) {
        const { data } = await supabaseClient.from('users').select('tg_id, first_name').eq('auth_token', token).single();
        if (data) {
            currentUser = { id: data.tg_id, first_name: data.first_name };
            document.getElementById('btn-pwa').style.display = 'none'; // В PWA прячем кнопку PWA
            return true;
        }
        return false;
    }

    // --- ФУНКЦИЯ ДЛЯ ПЕРЕХОДА В PWA ---
    function openPWA() {
        const token = localStorage.getItem('synd_token');
        if (!token) return alert('Ошибка токена!');
        
        // Формируем ссылку на твой гитхаб с токеном
        const baseUrl = window.location.href.split('?')[0]; 
        const pwaUrl = `${baseUrl}?token=${token}`;
        
        // Заставляем Телеграм открыть ссылку во внешнем браузере (Safari/Chrome)
        tg.openLink(pwaUrl);
    }

    async function initApp() {
        
        const isAuth = await authUser();
        
        if (!isAuth) {
            document.body.innerHTML = '<h2 style="text-align:center; margin-top: 50px;">❌ Доступ запрещен. Открой Хаб через Telegram-бота!</h2>';
            return;
        }
        

        loadMyStatus(); 
        loadFriends(); 
        loadMyCurrencies();
    }


    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    async function loadMyStatus() {
        const { data } = await supabaseClient.from('users').select('status').eq('tg_id', currentUser.id).single();
        document.getElementById('my-status').innerText = data?.status || 'Свободен 🟢';
    }

    async function toggleStatus() {
        const curr = document.getElementById('my-status').innerText;
        const newStatus = curr.includes('Свободен') ? 'Занят 🔴' : 'Свободен 🟢';
        document.getElementById('my-status').innerText = newStatus;
        await supabaseClient.from('users').update({ status: newStatus }).eq('tg_id', currentUser.id);
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }

    async function loadFriends() {
        const { data } = await supabaseClient.from('users').select('*');
        const list = document.getElementById('friends-list');
        list.innerHTML = '';
        data.forEach(f => {
            if(f.tg_id === currentUser.id) return;
            list.innerHTML += `<div class="friend-item" onclick="openFriend(${f.tg_id}, '${f.first_name}')"><span>${f.first_name}</span><span>${f.status || 'Свободен 🟢'}</span></div>`;
        });
    }

    async function loadMyCurrencies() {
        const { data } = await supabaseClient.from('currencies').select('*').eq('owner_id', currentUser.id);
        document.getElementById('my-currencies-list').innerHTML = data && data.length > 0 
            ? data.map(c => `
                <div class="card" style="padding:10px; display:flex; justify-content:space-between; align-items:center;">
                    <span>${c.name} (${c.rub_value}р)</span>
                    <span style="cursor:pointer; font-size:20px;" onclick="deleteCurrency('${c.id}')">❌</span>
                </div>`).join('')
            : '<p style="color: #777;">У тебя пока нет своих валют.</p>';
    }

    async function addCurrency() {
        const name = document.getElementById('cur-name').value;
        const price = parseFloat(document.getElementById('cur-price').value);
        if(!name || !price) return alert('Заполни поля!');
        await supabaseClient.from('currencies').insert({ owner_id: currentUser.id, name: name, rub_value: price });
        document.getElementById('cur-name').value = ''; document.getElementById('cur-price').value = '';
        loadMyCurrencies();
    }

    async function deleteCurrency(id) {
        if(!confirm('Удалить эту валюту?')) return;
        await supabaseClient.from('currencies').delete().eq('id', id);
        loadMyCurrencies();
    }

    async function openFriend(tgId, name) {
        currentFriend = { id: tgId, name: name };
        document.getElementById('friend-name-title').innerText = name;
        switchScreen('screen-friend');
        
        const { data: iOwe } = await supabaseClient.from('debts').select('*').eq('creditor_id', tgId).eq('debtor_id', currentUser.id);
        const { data: owesMe } = await supabaseClient.from('debts').select('*').eq('creditor_id', currentUser.id).eq('debtor_id', tgId);
        
        let html = '';
        if (iOwe && iOwe.length > 0) {
            html += '<div style="color: #ff5252; margin-top: 10px; font-weight: bold;">🔴 Я должен:</div>';
            html += iOwe.map(d => `<div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom: 1px solid #444;"><span>${d.amount} ${d.currency}</span><button class="btn-resolve" onclick="deleteDebt('${d.id}')">Вернул</button></div>`).join('');
        }
        if (owesMe && owesMe.length > 0) {
            html += '<div style="color: #4caf50; margin-top: 15px; font-weight: bold;">🟢 Мне должны:</div>';
            html += owesMe.map(d => `<div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom: 1px solid #444;"><span>${d.amount} ${d.currency}</span><button class="btn-resolve" onclick="deleteDebt('${d.id}')">Простить</button></div>`).join('');
        }
        document.getElementById('friend-debts').innerHTML = html || '<div style="color:#777; margin-top:10px;">Никто никому не должен</div>';
    }

    async function deleteDebt(id) {
        if(!confirm('Точно закрыть этот долг?')) return;
        await supabaseClient.from('debts').delete().eq('id', id);
        openFriend(currentFriend.id, currentFriend.name); 
    }

    async function openDebtModal() {
        document.getElementById('debt-rubles').value = ''; document.getElementById('debt-result').innerText = '0';
        const { data: friendCurrencies } = await supabaseClient.from('currencies').select('*').eq('owner_id', currentFriend.id);
        const select = document.getElementById('debt-currency');
        select.innerHTML = '';
        if (!friendCurrencies || friendCurrencies.length === 0) {
            select.innerHTML = `<option value="Руб." data-price="1">Рубли (1 к 1)</option>`;
        } else {
            friendCurrencies.forEach(c => select.innerHTML += `<option value="${c.name}" data-price="${c.rub_value}">${c.name} (${c.rub_value}р)</option>`);
        }
        switchScreen('screen-add-debt');
    }

    function calculateDebt() {
        const rubles = parseFloat(document.getElementById('debt-rubles').value) || 0;
        const select = document.getElementById('debt-currency');
        const price = parseFloat(select.options[select.selectedIndex]?.getAttribute('data-price')) || 1;
        document.getElementById('debt-result').innerText = rubles === 0 ? '0' : `${(rubles / price).toFixed(1)} ${select.value}`;
    }

    async function saveDebt() {
        const finalAmountText = document.getElementById('debt-result').innerText; 
        if(finalAmountText === '0') return alert('Введи сумму');
        const [amountStr, ...currencyArr] = finalAmountText.split(' ');
        await supabaseClient.from('debts').insert({
            creditor_id: currentFriend.id, debtor_id: currentUser.id, amount: parseFloat(amountStr), currency: currencyArr.join(' ')
        });
        if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        openFriend(currentFriend.id, currentFriend.name); 
    }

    initApp();
</script>
</body>
</html>
