    <script>

    // Вычисление сходства векторов (от -1 до 1, где 1 — идеальное совпадение)
    function cosineSimilarity(vecA, vecB) {
        let dotProduct = 0, normA = 0, normB = 0;
        for (let i = 0; i < vecA.length; i++) {
            dotProduct += vecA[i] * vecB[i];
            normA += vecA[i] * vecA[i];
            normB += vecB[i] * vecB[i];
        }
        if (normA === 0 || normB === 0) return 0;
        return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
    }

    async function performSearch() {
        const query = document.getElementById('search-input').value.trim();
        const resultsDiv = document.getElementById('search-results');
        const isSemantic = document.getElementById('semantic-toggle').checked;
        const threshold = parseFloat(document.getElementById('semantic-slider').value);

        if (!query || !currentChatId) return;
        resultsDiv.innerHTML = '<div style="color: #ff9800; text-align: center;">Взлом истории сообщений...</div>';

        // 1. Скачиваем все сообщения из комнаты
        const { data: history } = await supabaseClient.from('messages')
            .select('encrypted_text, encrypted_vector, created_at')
            .eq('chat_id', currentChatId);

        if (!history || history.length === 0) {
            resultsDiv.innerHTML = '<div style="color: #777;">Чат пуст.</div>';
            return;
        }

        let results = [];
        let queryVector = null;

        // 2. Если ИИ-поиск, векторизуем запрос
        if (isSemantic) {
            resultsDiv.innerHTML = '<div style="color: #ff9800; text-align: center;">Анализ смысла запроса...</div>';
            const ai = await initAI();
            const output = await ai(query, { pooling: 'mean', normalize: true });
            queryVector = output.data; // Float32Array
        }

        resultsDiv.innerHTML = '<div style="color: #ff9800; text-align: center;">Сравнение данных...</div>';

        // 3. Расшифровываем и ищем
        for (const msg of history) {
            try {
                // Расшифровываем ТЕКСТ
                const rawData = atob(msg.encrypted_text);
                const bytes = new Uint8Array(rawData.length);
                for (let i = 0; i < rawData.length; i++) bytes[i] = rawData.charCodeAt(i);
                
                const decryptedTextBuffer = await window.crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: bytes.slice(0, 12) }, currentAesKey, bytes.slice(12)
                );
                let plainText = dec.decode(decryptedTextBuffer);
                
                // Очищаем маркеры ГС для красивого отображения
                let displayText = plainText;
                if (plainText.startsWith('[VOICE]:')) {
                    const parts = plainText.replace('[VOICE]:', '').split('|');
                    displayText = parts[1] ? `🎤 ${parts[1]}` : '🎤 Зашифрованное ГС';
                }

                if (isSemantic && msg.encrypted_vector) {
                    // ИИ ПОИСК: Расшифровываем ВЕКТОР
                    const vecRaw = atob(msg.encrypted_vector);
                    const vecBytes = new Uint8Array(vecRaw.length);
                    for (let i = 0; i < vecRaw.length; i++) vecBytes[i] = vecRaw.charCodeAt(i);
                    
                    const decryptedVecBuffer = await window.crypto.subtle.decrypt(
                        { name: "AES-GCM", iv: vecBytes.slice(0, 12) }, currentAesKey, vecBytes.slice(12)
                    );
                    const msgVector = new Float32Array(decryptedVecBuffer); // Превращаем байты обратно в числа
                    
                    // Сравниваем смысл
                    const score = cosineSimilarity(queryVector, msgVector);
                    if (score >= threshold) {
                        results.push({ text: displayText, score: score, time: msg.created_at });
                    }
                } else if (!isSemantic) {
                    // ОБЫЧНЫЙ ПОИСК: Ищем подстроку
                    if (displayText.toLowerCase().includes(query.toLowerCase())) {
                        results.push({ text: displayText, score: 1, time: msg.created_at });
                    }
                }
            } catch (e) {
                console.error("Пропуск битого сообщения при поиске");
            }
        }

        // 4. Отрисовка результатов
        if (results.length === 0) {
            resultsDiv.innerHTML = '<div style="color: #777; text-align: center;">Ничего не найдено.</div>';
            return;
        }

        // Сортируем: ИИ-поиск по точности совпадения, обычный по дате
        if (isSemantic) {
            results.sort((a, b) => b.score - a.score);
        } else {
            results.sort((a, b) => new Date(b.time) - new Date(a.time));
        }

        resultsDiv.innerHTML = results.map(r => `
            <div style="padding: 8px; background: #2a2a2a; border-radius: 6px; margin-bottom: 5px;">
                <div style="color: #fff; margin-bottom: 3px;">${r.text}</div>
                <div style="color: #777; display: flex; justify-content: space-between;">
                    <span>${new Date(r.time).toLocaleDateString()} ${new Date(r.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                    ${isSemantic ? `<span style="color:#4caf50;">Точность: ${(r.score * 100).toFixed(0)}%</span>` : ''}
                </div>
            </div>
        `).join('');
    }

    // Показ ползунка только если включен ИИ-поиск
    function toggleSlider() {
        const isChecked = document.getElementById('semantic-toggle').checked;
        document.getElementById('slider-container').style.display = isChecked ? 'flex' : 'none';
    }
    
    
    // --- ИИ: ЭМБЕДДИНГИ ДЛЯ ПОИСКА (RAG) ---
    let extractor = null;
    let isAiLoading = false;

    async function initAI() {
        if (extractor) return extractor;
        if (isAiLoading) {
            while (isAiLoading) await new Promise(r => setTimeout(r, 100));
            return extractor;
        }
        
        isAiLoading = true;
        console.log("Загрузка ИИ-модели для векторов...");
        
        // Динамический импорт прямо внутри функции! HTML-кнопки не сломаются.
        const { pipeline, env } = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.14.0');
        env.allowLocalModels = false;
        
        extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', { quantized: true });
        isAiLoading = false;
        return extractor;
    }

    async function generateAndEncryptVector(text, aesKey) {
        const ai = await initAI();
        
        // Генерируем вектор из текста
        const output = await ai(text, { pooling: 'mean', normalize: true });
        const arrayBuffer = output.data.buffer; // Float32Array -> бинарный буфер
        
        // Шифруем вектор нашим AES-ключом комнаты
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const encryptedContent = await window.crypto.subtle.encrypt(
            { name: "AES-GCM", iv: iv }, aesKey, arrayBuffer
        );
        
        // Склеиваем IV и шифр, пакуем в Base64 для базы
        const encryptedBytes = new Uint8Array(encryptedContent);
        const payload = new Uint8Array(iv.length + encryptedBytes.length);
        payload.set(iv, 0);
        payload.set(encryptedBytes, iv.length);
        
        return btoa(String.fromCharCode.apply(null, payload));
    }

        
    const tg = window.Telegram.WebApp;
    tg.expand(); 

    const supabaseClient = supabase.createClient(
        'https://cqhndgtiqdjzzrqdzrfq.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxaG5kZ3RpcWRqenpycWR6cmZxIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MzI4NzE3MCwiZXhwIjoyMDk4ODYzMTcwfQ.OMiry_4g_5Bn5VzjoA79V_MGnccm1x5D-Yne1Wc49Sw'
    );

    // Теперь юзер глобальный и может браться как из ТГ, так и из БД напрямую
    let currentUser = null; 
    let currentFriend = null; 

    

    // Вспомогательная функция перевода строки в байты
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    
    // 1. ШИФРОВАНИЕ ТЕКСТА
    async function encryptText(text, aesKey) {
        // В AES-GCM нужен вектор инициализации (IV). Это как "соль" для пароля.
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        
        const encryptedContent = await window.crypto.subtle.encrypt(
            { name: "AES-GCM", iv: iv },
            aesKey,
            enc.encode(text)
        );
    
        // Склеиваем IV и само сообщение, чтобы при расшифровке знать эту "соль"
        const encryptedBytes = new Uint8Array(encryptedContent);
        const payload = new Uint8Array(iv.length + encryptedBytes.length);
        payload.set(iv, 0);
        payload.set(encryptedBytes, iv.length);
    
        // Превращаем массив в Base64, чтобы положить в Supabase как текст (text тип колонки)
        return btoa(String.fromCharCode.apply(null, payload));
    }
    
    // 2. ОТПРАВКА СООБЩЕНИЯ
    async function sendTextMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;
    
        // Временно берем "тестовый" chat_id (нужно будет создать запись в таблице chats)
        const testChatId = "00000000-0000-0000-0000-000000000001";
        const aesKey = await idbKeyval.get('current_chat_key'); // Достаем ключ из памяти
    
        if (!aesKey) {
            alert("Сначала нужно выковать ключ чата!");
            return;
        }
    
        const encryptedPayload = await encryptText(text, aesKey);
    
        input.value = ""; // Очищаем поле
        
        // Пишем в БД
        await supabaseClient.from('messages').insert([
            { 
                chat_id: testChatId, 
                sender_id: currentUser.id, 
                encrypted_text: encryptedPayload 
            }
        ]);
    }
    
    // 3. СЛУШАЕМ БАЗУ (WebSockets)
    // 1. Добавляем глобальную переменную для хранения текущей подписки (где-нибудь в начале скрипта)
    let testRoomSubscription = null;

    // 2. Обновляем саму функцию
    function listenForMessages(chatId, aesKey) {
        // ГЛАВНЫЙ ФИКС: Если мы уже слушаем канал — отписываемся от него перед пересозданием
        if (testRoomSubscription) {
            supabaseClient.removeChannel(testRoomSubscription);
        }

        // Записываем новую подписку в нашу переменную
        testRoomSubscription = supabaseClient.channel('custom-all-channel')
            .on(
                'postgres_changes',
                { event: 'INSERT', schema: 'public', table: 'messages', filter: `chat_id=eq.${chatId}` },
                async (payload) => {
                    const newMsg = payload.new;
                    
                    // РАСШИФРОВКА
                    const rawData = atob(newMsg.encrypted_text);
                    const bytes = new Uint8Array(rawData.length);
                    for (let i = 0; i < rawData.length; i++) bytes[i] = rawData.charCodeAt(i);

                    const iv = bytes.slice(0, 12);
                    const data = bytes.slice(12);

                    try {
                        const decryptedBuffer = await window.crypto.subtle.decrypt(
                            { name: "AES-GCM", iv: iv },
                            aesKey,
                            data
                        );
                        const plainText = dec.decode(decryptedBuffer);
                        
                        // Рисуем сообщение в UI
                        renderMessage(plainText, newMsg.sender_id === currentUser.id);
                    } catch (e) {
                        renderMessage("🔒 [Ошибка расшифровки]", newMsg.sender_id === currentUser.id);
                    }
                }
            )
            .subscribe();
    }
    
    function renderMessage(text, isMine, timeString = "") {
        const area = document.getElementById('messages-area');
        const div = document.createElement('div');
        div.className = `msg-bubble ${isMine ? 'msg-mine' : 'msg-other'}`;
        
        if (text.startsWith('[VOICE]:')) {
            // Разбиваем маркер: [VOICE]:имя_файла|расшифрованный_текст
            const parts = text.replace('[VOICE]:', '').split('|');
            const fileName = parts[0];
            const transcription = parts[1] ? `<i>"${parts[1]}"</i>` : '<i style="color:#777">ГС (без текста)</i>';
            
            div.innerHTML = `
                <div style="cursor:pointer; display:flex; align-items:center; gap:8px; padding: 5px; background: rgba(0,0,0,0.15); border-radius: 8px;" 
                     onclick="loadAndPlayVoice('${fileName}', this)">
                    <span style="font-size: 24px;">▶️</span>
                    <span class="voice-status">Зашифрованное ГС</span>
                </div>
                <div style="margin-top: 8px; font-size: 14px; color: #ddd; word-break: break-word;">
                    ${transcription}
                </div>`;
        } else {
            div.innerText = text;
        }
        
        if (timeString) {
            const timeDiv = document.createElement('div');
            timeDiv.className = 'msg-time';
            timeDiv.innerText = timeString;
            div.appendChild(timeDiv);
        }
        
        area.appendChild(div);
        area.scrollTop = area.scrollHeight; 
    }


    async function loadAndPlayVoice(fileName, element) {
        const statusSpan = element.querySelector('.voice-status');
        statusSpan.innerText = 'Взлом файла...';
        
        // 1. Скачиваем шифр из бакета
        const { data, error } = await supabaseClient.storage.from('voice_messages').download(fileName);
        if (error) { statusSpan.innerText = 'Ошибка сети'; return; }

        // 2. Достаем байты
        const arrayBuffer = await data.arrayBuffer();
        const bytes = new Uint8Array(arrayBuffer);
        const iv = bytes.slice(0, 12);
        const encryptedData = bytes.slice(12);

        try {
            // 3. Расшифровываем аудио
            const decryptedBuffer = await window.crypto.subtle.decrypt(
                { name: "AES-GCM", iv: iv },
                currentAesKey,
                encryptedData
            );

            // 4. Собираем аудиофайл и создаем локальную ссылку
            const decryptedBlob = new Blob([decryptedBuffer]);
            const audioUrl = URL.createObjectURL(decryptedBlob);

    // 1. ПРИ ГЕНЕРАЦИИ СОХРАНЯЕМ С ID ПОЛЬЗОВАТЕЛЯ
    async function generatePersonalArmor(userId) {
        const keyPair = await window.crypto.subtle.generateKey(
            { name: "RSA-OAEP", modulusLength: 4096, publicExponent: new Uint8Array([1, 0, 1]), hash: "SHA-256" },
            true, ["encrypt", "decrypt"]
        );
        
        // ФИКС: У каждого юзера теперь свой личный сейф в памяти телефона
        await idbKeyval.set(`my_private_key_${userId}`, keyPair.privateKey);
        
        const exportedPublicKey = await window.crypto.subtle.exportKey("jwk", keyPair.publicKey);
        return exportedPublicKey;
    }

    // 2. ПРИ ПРОВЕРКЕ ИЩЕМ КЛЮЧ КОНКРЕТНОГО ПОЛЬЗОВАТЕЛЯ
    async function checkCryptoKeys(userId) {
        // ФИКС: Ищем по ID
        const privateKey = await idbKeyval.get(`my_private_key_${userId}`);
        
        const { data: userData } = await supabaseClient.from('users').select('public_key').eq('tg_id', userId).single();
        const isDbKeyMissing = !userData || !userData.public_key;

        if (!privateKey || isDbKeyMissing) {
            console.log("Броня повреждена или отсутствует. Выковываем новую...");
            // ФИКС: Передаем userId в генератор
            const publicKeyJwk = await generatePersonalArmor(userId); 
            
            const { error } = await supabaseClient.from('users').update({ public_key: JSON.stringify(publicKeyJwk) }).eq('tg_id', userId);
            if (error) console.error("Ошибка загрузки ключа в базу:", error);
        }
    }

    async function generateChatKey() {
        // Генерируем AES-GCM (очень быстрый алгоритм для текста)
        const chatKey = await window.crypto.subtle.generateKey(
            { name: "AES-GCM", length: 256 },
            true, // Разрешаем экспорт, чтобы упаковать в чужие сейфы
            ["encrypt", "decrypt"]
        );
        return chatKey;
    }

    // publicJwk - это публичный ключ друга из БД Supabase
    // НАДЁЖНОЕ ШИФРОВАНИЕ КЛЮЧА ЧАТА (Конвертируем в Base64)
    async function encryptChatKeyForFriend(chatKey, friendPublicJwk) {
        const friendPublicKey = await window.crypto.subtle.importKey(
            "jwk",
            friendPublicJwk,
            { name: "RSA-OAEP", hash: "SHA-256" },
            true,
            ["encrypt"]
        );

        const rawChatKey = await window.crypto.subtle.exportKey("raw", chatKey);

        const encryptedKeyBuffer = await window.crypto.subtle.encrypt(
            { name: "RSA-OAEP" },
            friendPublicKey,
            rawChatKey
        );

        // ФИКС: Переводим бинарный ArrayBuffer в безопасную Base64 строку
        const bytes = new Uint8Array(encryptedKeyBuffer);
        return btoa(String.fromCharCode.apply(null, bytes));
    }

    // НАДЁЖНОЕ РАСШИФРОВЫВАНИЕ КЛЮЧА ЧАТА (Из Base64 обратно в байты)
    // 3. ПРИ РАСШИФРОВКЕ ДОСТАЕМ ИМЕННО СВОЙ КЛЮЧ
    async function decryptChatKey(encryptedKeyBase64) {
        // ФИКС: Достаем ключ текущего юзера
        const myPrivateKey = await idbKeyval.get(`my_private_key_${currentUser.id}`);

        const binaryString = atob(encryptedKeyBase64);
        const encryptedKeyBuffer = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
            encryptedKeyBuffer[i] = binaryString.charCodeAt(i);
        }

        const rawChatKey = await window.crypto.subtle.decrypt(
            { name: "RSA-OAEP" },
            myPrivateKey,
            encryptedKeyBuffer
        );

        const chatKey = await window.crypto.subtle.importKey(
            "raw",
            rawChatKey,
            { name: "AES-GCM", length: 256 },
            false,
            ["encrypt", "decrypt"]
        );

        return chatKey;
    }
        
    // --- УМНАЯ АВТОРИЗАЦИЯ (ТГ + PWA) ---
    async function authUser() {
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');
        const tgUser = tg.initDataUnsafe?.user;
    
        let isAuthorized = false;
    
        // Вариант 1: Мы внутри Телеграма
        if (tgUser) {
            currentUser = { id: tgUser.id, first_name: tgUser.first_name };
            
            const myToken = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
            
            const { data } = await supabaseClient.from('users').select('auth_token').eq('tg_id', currentUser.id).single();
            let finalToken = data?.auth_token;
    
            if (!finalToken) {
                finalToken = myToken; 
            }
    
            await supabaseClient.from('users').upsert({ 
                tg_id: currentUser.id, 
                first_name: currentUser.first_name,
                auth_token: finalToken
            }, { onConflict: 'tg_id' });
    
            localStorage.setItem('synd_token', finalToken);
            isAuthorized = true;
        } 
        // Вариант 2: Перешли по ссылке с токеном (Настраиваем PWA)
        else if (urlToken) {
            localStorage.setItem('synd_token', urlToken);
            window.history.replaceState({}, document.title, window.location.pathname);
            isAuthorized = await fetchUserByToken(urlToken); // Функция должна записывать данные в currentUser
        }
        // Вариант 3: Просто открыли PWA (Токен уже в памяти)
        else if (localStorage.getItem('synd_token')) {
            isAuthorized = await fetchUserByToken(localStorage.getItem('synd_token')); // Функция должна записывать данные в currentUser
        }
    
        // Если авторизация прошла успешно, запускаем проверку крипто-брони!
        if (isAuthorized && currentUser && currentUser.id) {
            // 1. Проверяем личную броню (RSA)
            await checkCryptoKeys(currentUser.id);

            return true;
        }
    
        return false; // Не авторизован
    }

            document.getElementById('btn-pwa').style.display = 'none'; // В PWA прячем кнопку PWA

    let currentChatId = null;
    let currentAesKey = null;
    let currentChatSubscription = null;

    // Вызывается автоматически при открытии профиля друга
    async function initPrivateChat(friendId) {
        document.getElementById('messages-area').innerHTML = '<div style="text-align:center; color:#777;">Проверка крипто-ключей...</div>';
        
        // 1. Ищем общую комнату через SQL-функцию
        const { data: existingChatId, error } = await supabaseClient.rpc('get_private_chat', { 
            user1_id: currentUser.id, 
            user2_id: friendId 
        });

        if (existingChatId) {
            currentChatId = existingChatId;
            await loadExistingChat();
        } else {

        }

    async function createNewPrivateChat(friendId) {
        // Достаем публичный ключ друга из базы
        const { data: friendData } = await supabaseClient.from('users').select('public_key').eq('tg_id', friendId).single();
        const { data: myData } = await supabaseClient.from('users').select('public_key').eq('tg_id', currentUser.id).single();

        if (!friendData?.public_key) {
            document.getElementById('messages-area').innerHTML = '<div style="text-align:center; color:#ff5252;">Пользователь еще не создал крипто-броню. Чат невозможен.</div>';
            return;
        }

        document.getElementById('messages-area').innerHTML = '<div style="text-align:center; color:#ff9800;">Генерация безопасного канала...</div>';

        // 1. Генерируем новый AES ключ для этой комнаты
        currentAesKey = await generateChatKey();

        // 2. Создаем комнату
        const { data: newChat } = await supabaseClient.from('chats').insert({ name: 'private' }).select().single();
        currentChatId = newChat.id;

        // 3. Шифруем AES ключ публичным ключом друга и СВОИМ публичным ключом (чтобы ты тоже мог читать историю)
        const encKeyForFriend = await encryptChatKeyForFriend(currentAesKey, JSON.parse(friendData.public_key));
        const encKeyForMe = await encryptChatKeyForFriend(currentAesKey, JSON.parse(myData.public_key));

        // 4. Раскладываем зашифрованные ключи по сейфам
        await supabaseClient.from('chat_keys').insert([
            { chat_id: currentChatId, user_id: friendId, encrypted_key: encKeyForFriend },
            { chat_id: currentChatId, user_id: currentUser.id, encrypted_key: encKeyForMe }
        ]);

        document.getElementById('messages-area').innerHTML = '<div style="text-align:center; color:#4caf50;">Канал защищен. E2EE активно 🔒</div>';
        subscribeToPrivateMessages();
    }

    async function loadExistingChat() {
        // 1. Достаем НАШ зашифрованный экземпляр ключа от этой комнаты
        const { data: keyData } = await supabaseClient.from('chat_keys')
            .select('encrypted_key').eq('chat_id', currentChatId).eq('user_id', currentUser.id).single();

        // 2. Вскрываем его своим приватным ключом из IndexedDB
        currentAesKey = await decryptChatKey(keyData.encrypted_key);
        
        // Очищаем статус "Подключение..."
        document.getElementById('messages-area').innerHTML = ''; 
        
        // 3. ПОДГРУЗКА ИСТОРИИ ИЗ БАЗЫ
        const { data: history } = await supabaseClient.from('messages')
            .select('*')
            .eq('chat_id', currentChatId)
            .order('created_at', { ascending: true }); // Сортируем от старых к новым

        if (history && history.length > 0) {
            for (const msg of history) {
                try {
                    const msgDate = new Date(msg.created_at);
                    const timeStr = msgDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    // Разбиваем Base64 обратно в байты
                    const rawData = atob(msg.encrypted_text);
                    const bytes = new Uint8Array(rawData.length);
                    for (let i = 0; i < rawData.length; i++) bytes[i] = rawData.charCodeAt(i);

                    const iv = bytes.slice(0, 12);
                    const data = bytes.slice(12);

                    // Расшифровываем AES-ключом
                    const decryptedBuffer = await window.crypto.subtle.decrypt(
                        { name: "AES-GCM", iv: iv }, 
                        currentAesKey, 
                        data
                    );
                    const plainText = dec.decode(decryptedBuffer);
                    
                    // Рисуем на экране
                    renderMessage(plainText, msg.sender_id === currentUser.id, timeStr);
                } catch (e) {
                    renderMessage("🔒 [Ошибка расшифровки истории]", msg.sender_id === currentUser.id);
                }
            }
        }

        // 4. Запускаем прослушку новых сообщений
        subscribeToPrivateMessages();
    }

    async function sendPrivateMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text || !currentAesKey || !currentChatId) return;

        input.value = ""; // Сразу очищаем
        
        // 1. Шифруем сам текст
        const encryptedPayload = await encryptText(text, currentAesKey);
        
        // 2. Генерируем и шифруем вектор для поиска по смыслу
        const encryptedVector = await generateAndEncryptVector(text, currentAesKey);

        // 3. Отправляем в Supabase
        await supabaseClient.from('messages').insert([
            { 
                chat_id: currentChatId, 
                sender_id: currentUser.id, 
                encrypted_text: encryptedPayload,
                encrypted_vector: encryptedVector // <--- Сохраняем зашифрованный вектор
            }
        ]);
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    function handleEnter(e) { if (e.key === 'Enter') sendPrivateMessage(); }

    function subscribeToPrivateMessages() {
        // Отписываемся от предыдущего чата, если быстро переключили профиль
        if (currentChatSubscription) supabaseClient.removeChannel(currentChatSubscription);

        currentChatSubscription = supabaseClient.channel('private-chat')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `chat_id=eq.${currentChatId}` },
                async (payload) => {
                    const newMsg = payload.new;

                    // Берем время прямо из свежего сообщения
                    const msgDate = new Date(newMsg.created_at);
                    const timeStr = msgDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    
                    // РАСШИФРОВКА
                    const rawData = atob(newMsg.encrypted_text);
                    const bytes = new Uint8Array(rawData.length);
                    for (let i = 0; i < rawData.length; i++) bytes[i] = rawData.charCodeAt(i);

                    const iv = bytes.slice(0, 12);
                    const data = bytes.slice(12);

                    try {
                        const decryptedBuffer = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, currentAesKey, data);
                        const plainText = dec.decode(decryptedBuffer);
                        renderMessage(plainText, newMsg.sender_id === currentUser.id, timeStr);
                    } catch (e) {
                        renderMessage("🔒 [Ошибка]", newMsg.sender_id === currentUser.id);
                    }
                }
            ).subscribe();
    }

    // --- МОДУЛЬ ЗАПИСИ И ШИФРОВАНИЯ ГОЛОСА ---
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let speechRecognition = null;
    let currentTranscription = "";

    async function recordVoice() {
        if (isRecording) {
            mediaRecorder.stop();
            if (speechRecognition) speechRecognition.stop(); // Останавливаем распознавание
            return;
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            currentTranscription = "";

            // Включаем встроенный "дешифровщик" голоса в текст
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                speechRecognition = new SpeechRecognition();
                speechRecognition.lang = 'ru-RU'; // Русский язык
                speechRecognition.interimResults = true;
                speechRecognition.continuous = true;
                
                speechRecognition.onresult = (event) => {
                    let finalTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                    }
                    if (finalTranscript) currentTranscription += finalTranscript + ' ';
                };
                speechRecognition.start();
            }

            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
            
            mediaRecorder.onstop = async () => {
                stream.getTracks().forEach(track => track.stop());
                const audioBlob = new Blob(audioChunks);
                isRecording = false;
                
                document.getElementById('btn-mic').innerText = '🎤';
                
                // Передаем файл И текст на шифровку
                await uploadAndSendVoice(audioBlob, currentTranscription.trim());
            };

            mediaRecorder.start();
            isRecording = true;
            document.getElementById('btn-mic').innerText = '🛑';
            
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

        } catch (err) {
            alert('Синдикату нужен доступ к микрофону!');
        }
    }

    async function uploadAndSendVoice(audioBlob, transcription) {
        if (!currentAesKey || !currentChatId) return;

        // 1. Шифруем аудио-файл
        const arrayBuffer = await audioBlob.arrayBuffer();
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const encryptedContent = await window.crypto.subtle.encrypt(
            { name: "AES-GCM", iv: iv }, currentAesKey, arrayBuffer
        );
        
        const encryptedBytes = new Uint8Array(encryptedContent);
        const payload = new Uint8Array(iv.length + encryptedBytes.length);
        payload.set(iv, 0);
        payload.set(encryptedBytes, iv.length);

        const fileName = `voice_${Date.now()}_${currentUser.id}.bin`;
        await supabaseClient.storage.from('voice_messages').upload(fileName, payload, { contentType: 'application/octet-stream' });

        // 2. Формируем маркер, склеивая имя файла и распознанный текст (через символ |)
        let textMarker = `[VOICE]:${fileName}`;
        if (transcription) textMarker += `|${transcription}`;
        
        const encryptedPayloadText = await encryptText(textMarker, currentAesKey);
        
        // 3. Если есть текст из ГС, сразу делаем из него вектор!
        let encryptedVector = null;
        if (transcription) {
            encryptedVector = await generateAndEncryptVector(transcription, currentAesKey);
        }

        // 4. Отправляем в базу
        await supabaseClient.from('messages').insert([
            { 
                chat_id: currentChatId, 
                sender_id: currentUser.id, 
                encrypted_text: encryptedPayloadText,
                encrypted_vector: encryptedVector // <--- Сохраняем вектор ГС
            }
        ]);
    }

        if (!friendCurrencies || friendCurrencies.length === 0) {
            select.innerHTML = `<option value="Руб." data-price="1">Рубли (1 к 1)</option>`;
        } else {
            friendCurrencies.forEach(c => select.innerHTML += `<option value="${c.name}" data-price="${c.rub_value}">${c.name} (${c.rub_value}р)</option>`);
        }
        switchScreen('screen-add-debt');
    }

    function calculateDebt() {
        const rubles = parseFloat(document.getElementById('debt-rubles').value) || 0;
        const select = document.getElementById('debt-currency');
        const price = parseFloat(select.options[select.selectedIndex]?.getAttribute('data-price')) || 1;
        document.getElementById('debt-result').innerText = rubles === 0 ? '0' : `${(rubles / price).toFixed(1)} ${select.value}`;
    }

    async function saveDebt() {
        const finalAmountText = document.getElementById('debt-result').innerText; 
        if(finalAmountText === '0') return alert('Введи сумму');
        const [amountStr, ...currencyArr] = finalAmountText.split(' ');
        await supabaseClient.from('debts').insert({
            creditor_id: currentFriend.id, debtor_id: currentUser.id, amount: parseFloat(amountStr), currency: currencyArr.join(' ')
        });
        if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        openFriend(currentFriend.id, currentFriend.name); 
    }

    initApp();
</script>
</body>
</html>
